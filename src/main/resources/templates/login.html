<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Portail Immobilier</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/massi_logo.png}">

    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Zone image (gauche) */
        .image-left {
            flex: 2;
            position: relative;
        }

        .carousel-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        /* Zone login (droite) */
        .login-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f7;
        }

        .login-container {
            width: 90%;
            max-width: 400px;
        }

        /* Mobile : cacher les images et afficher uniquement le formulaire */
		@media (max-width: 768px) {
		    body {
		        flex-direction: column;
		    }

		    /* ✅ On affiche toujours les images, mais en plus petit */
		    .image-left {
		        display: block;
		        width: 100%;
		        height: 200px; /* hauteur plus réduite pour mobile */
		        order: -1; /* pour que le carrousel soit au-dessus du formulaire */
		    }

		    .carousel-item img {
		        height: 200px;
		        object-fit: cover;
		    }

		    .login-right {
		        width: 100%;
		        padding: 20px;
		    }

		    .login-container {
		        width: 100%;
		        max-width: none;
		    }
		}

        /* Animation de chargement */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <!-- ✅ Zone gauche : Carrousel d’images -->
    <div class="image-left">
        <div id="carouselImmobilier" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="4000">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img th:src="@{/images/massi.jpg}" class="d-block w-100" alt="Image 1">
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ Zone droite : Formulaire -->
    <div class="login-right">
        <div class="login-container">
            <div style="text-align: center; margin-bottom: 1em;">
                <img th:src="@{/images/massi_logo.png}" alt="Logo" style="height: 80px;">
            </div>
            <h2 style="text-align: center;">BIENVENUE SUR LE PORTAIL DU SYSTÈME INTÉGRÉ DE GESTION IMMOBILIÈRE</h2>
            
			<form th:action="@{/login}" method="post" class="w-100 mx-auto" onsubmit="showLoading()">

				<input type="hidden"
				       th:if="${_csrf != null}"
				       th:name="${_csrf.parameterName}"
				       th:value="${_csrf.token}" />

			    <div class="mb-3">
			        <input type="text" name="username" class="form-control"
			               placeholder="Nom d'utilisateur" required>
			    </div>

			    <div class="mb-3">
			        <input type="password" name="password" class="form-control"
			               placeholder="Mot de passe" required>
			    </div>

			    <div class="d-grid">
			        <button type="submit" class="btn btn-primary">Se connecter</button>
			    </div>
			</form>

            <!-- Animation de chargement -->
            <div id="loading-overlay" class="loading-overlay" style="display: none;">
                <div class="spinner"></div>
                <p>Chargement en cours...</p>
            </div>
			
			<div th:if="${param.error}">
			    <span class="text-danger">
			        Accès refusé (abonnement expiré ou agence bloquée)
			    </span>
			</div>
			
        </div>
    </div>

    <!-- ✅ Scripts Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script nettoyage URL + chargement -->
    <script>
        const url = new URL(window.location);
        ["logout", "error"].forEach(param => {
            if (url.searchParams.has(param)) {
                url.searchParams.delete(param);
                window.history.replaceState({}, document.title, url.pathname);
            }
        });

        function showLoading() {
            document.getElementById("loading-overlay").style.display = "flex";
        }
    </script>
</body>
</html>
