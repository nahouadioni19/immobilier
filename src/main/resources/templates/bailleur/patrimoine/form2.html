<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
    <section layout:fragment="content">
	    <!-- Ton contenu principal ici -->
		<div class="container my-2">
			<div class="container mt-4">
				
				<form th:action="@{/patrimoines/save}" th:object="${immeubForm}" method="post" enctype="multipart/form-data">
					<div id="step1">
					<input type="hidden" th:field="*{immeuble.id}"/>
					<input type="hidden" th:field="*{immeuble.version}" />
					
					<h2 th:text="*{immeuble.id == 0 ? 'Ajouter un patrimoine' : 'Modifier un patrimoine'}" style="text-align: center;">Ajouter un patrimoine</h2>
					<hr>
					<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
					<h4>Informations du patrimoine</h4>
					<div class="row">
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Désignation :<span style="color:red;"> *</span></label>
						    <input type="text" th:field="*{immeuble.nomImmeuble}" required class="form-control" oninput="uppercaseWords(this)">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Code :</label>
						    <input type="text" th:field="*{immeuble.codeImmeuble}" class="form-control" oninput="uppercaseWords(this)">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Adresse :</label>
						    <input type="text" th:field="*{immeuble.adresse}" class="form-control">
							</div>
						</div>
					</div>
					
					<div class="row">
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Pays :</label>
						    <input type="text" th:field="*{immeuble.pays}" class="form-control">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Ville :</label>
						    <input type="text" th:field="*{immeuble.ville}" class="form-control">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Nombre d'étages :</label>
							<input type="number" th:field="*{immeuble.nombreEtages}" min="0" class="form-control">
							</div>
						</div>
					</div>
					<div class="row">
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Année construction :</label>
						    <input type="number" th:field="*{immeuble.anneeConstruction}" min="1900" class="form-control">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Type :</label>
						    <input type="text" th:field="*{immeuble.typeImmeuble}" class="form-control">
							</div>
						</div>
						<div class="col-sm-6 col-md-4">
							<div class="mb-3 form-group">
						    <label class="form-label">Titre foncier :</label>
						    <input type="text" th:field="*{immeuble.numeroTitreFoncier}" class="form-control" oninput="uppercaseWords(this)">
							</div>
						</div>
					</div>
					<hr>
					<div class="row">							
						<div class="col-sm-12 col-md-6">
							<div class="mb-3 form-group">
						    <label class="form-label">Bailleur :<span style="color:red;"> *</span></label>
							<select th:field="*{immeuble.bailleur}" id="bailleur" required class="form-control">
							    <option value="">-- Sélectionner --</option>
							    <option th:each="b : ${bailleurs}" th:value="${b.id}" th:text="|${b.prenom} ${b.nom}|"></option>
							</select>
							</div>
						</div>
						
						<div class="col-sm-12 col-md-6">
							<div class="mb-3 form-group">
						    <label class="form-label">Agent de recouvrement :<span style="color:red;"> *</span></label>
							<select th:field="*{immeuble.utilisateur}" id="utilisateur" required class="form-control">
							    <option value="">-- Sélectionner --</option>
							    <option th:each="u : ${utilisateurs}" th:value="${u.id}" th:text="|${u.prenoms} ${u.nom}|"></option>
							</select>
							</div>
						</div>
					</div>
					<hr>
					
					<div class="mt-3 row g-2">
					    <div class="col-12 col-md-2">
					        <button type="button" class="btn btn-primary w-100" onclick="validateStepAndProceed('step1', 2)">
					            <i class="bi bi-arrow-right"></i>Suivant</span>
					        </button>
					    </div>
					</div>
					</fieldset>
					
					</div>
					
					<div id="step2" style="display: none;">
					<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
				    <h4>Appartements</h4>
					<!-- Tableau des appartements -->
					    <table id="table-appartements" class="table table-bordered">
					        <thead style="text-align: center;">
					        <tr>
					            <th>Numéro<span style="color:red;"> *</span></th>
					            <th>Loyer</th>
					            <th>Libellé<span style="color:red;"> *</span></th>
					            <th>Action</th>
					        </tr>
					        </thead>
					        <tbody>								
							<tr th:each="app, iter : *{appartements}">
							    <td><input type="text" th:field="*{appartements[__${iter.index}__].numAppart}" class="form-control" oninput="uppercaseWords(this)" required></td>
							    <td><input type="number" th:field="*{appartements[__${iter.index}__].loyerMensuel}" class="form-control"></td>
							    <td><input type="text" th:field="*{appartements[__${iter.index}__].libelle}" class="form-control" oninput="uppercaseWords(this)" required></td>
							    <td><button type="button" onclick="supprimerLigne(this)" class="btn btn-danger">Supprimer</button></td>
							  </tr>
					        </tbody>
					    </table>
						
						<div class="mt-3 row g-2">
						    <div class="col-12 col-md-2">
						        <button type="button" class="btn btn-primary w-100" onclick="ajouterAppartement()">
						            <span>+ Ajouter</span>
						        </button>
						    </div>
						</div>
					
					<hr>
					
					<div class="mt-3 row g-2">
					    <div class="col-12 col-md-2">
					        <button type="button" class="btn btn-primary w-100" onclick="showStep(1)">
					            <span><i class="bi bi-arrow-left"></i>Précédent</span>
					        </button>
					    </div>
						
					    <div class="col-12 col-md-2">
							<button type="submit" class="btn btn-primary w-100">
								<span th:text="*{immeuble.id} == 0 ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
							</button>
					    </div>
					</div>	
					</fieldset>											
				</div>	

				</form>
				
			</div>
		 </div>
    

	
	<script th:inline="javascript">
	  // Taille actuelle de la liste (0 si null)
	 // let compteurAppartements = [[${#lists.size(immeubForm.appartements)?:0}]];
	  let compteurAppartements = document.querySelectorAll('#table-appartements tbody tr').length;
	 
	  function ajouterAppartement() {
	      const tbody = document.querySelector('#table-appartements tbody');
	      const idx = compteurAppartements++;

	      const tr = document.createElement('tr');
	      tr.innerHTML = `
	        <td><input type="text" name="appartements[${idx}].numAppart" class="form-control" oninput="uppercaseWords(this)" required></td>
	        <td><input type="number" name="appartements[${idx}].loyerMensuel" class="form-control"></td>
	        <td><input type="text" name="appartements[${idx}].libelle" class="form-control" oninput="uppercaseWords(this)" required></td>
	        <td><button type="button" onclick="supprimerLigne(this)" class="btn btn-danger">Supprimer</button></td>
	      `;
	      tbody.appendChild(tr);
	  }

	  function supprimerLigne(btn) {
	      btn.closest('tr').remove();
	  }
	</script>



	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<script>
		//AFFICHE LA PREMIERE LETTRE EN MAJUSCULE
		function capitalizeWords(input) {
		    input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
		        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
		    });
		}
	
		//METTRE TOUT LE MOT EN MAJUSCULE
		function uppercaseWords(input){
			input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
				return word.charAt(0).toUpperCase() + word.slice(1).toUpperCase();
			});
		}
	</script>
	
	<script>
	    function validateStepAndProceed(currentStepId, nextStepNumber) {
	        const currentStep = document.getElementById(currentStepId);
	        const requiredFields = currentStep.querySelectorAll('[required]');
	        let allValid = true;

	        requiredFields.forEach(field => {
	            if (!field.checkValidity()) {
	                field.classList.add('is-invalid'); // Ajout classe Bootstrap
	                allValid = false;
	            } else {
	                field.classList.remove('is-invalid');
	            }
	        });

	        if (allValid) {
	            showStep(nextStepNumber); // Si tout est OK, on passe à l'étape suivante
	        } else {
	            // Scroll vers le premier champ invalide
	            const firstInvalid = currentStep.querySelector('.is-invalid');
	            if (firstInvalid) {
	                firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
	            }
	        }
	    }
	</script>
					
	<script>
		//NAVIGUER ENTRE PAGE
		function showStep(stepNumber) {
	        document.getElementById('step1').style.display = stepNumber === 1 ? 'block' : 'none';
	        document.getElementById('step2').style.display = stepNumber === 2 ? 'block' : 'none';
			document.getElementById('step3').style.display = stepNumber === 3 ? 'block' : 'none';
	        window.scrollTo(0, 0); // remonte en haut
	    }		
	</script>
	
	 </section>
	
</body>
</html>
