<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
	  
<body>
    <!-- Fragment spécifique à cette page -->
    <section layout:fragment="content">
		<div class="container my-2">
			<div class="d-flex justify-content-between align-items-center mb-3">
			      <h2>Gestion des patrimoines</h2>
			      <a th:href="@{/patrimoines/create}" class="btn btn-primary">Nouveau</a>
			</div>
			<hr style="border: 1px solid rgb(192, 192, 192);">
			
			<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
				
				<div class="row mb-3">
				    <div class="col-md-4">
				        <input type="text" id="searchInput"
				               class="form-control"
				               placeholder="Rechercher prénom, nom ou téléphone"
				               autocomplete="off">
				    </div>
				</div>
				
			<div id="immeubleTable">								
				<div id="loader" class="text-center my-3 d-none">
				    <div class="spinner-border text-primary"></div>
				    <div>Recherche en cours...</div>
				</div>				
			    <table class="table ">
			        <thead class="table-success">
			        <tr>
			            <th>Désigantion</th>
						<th>Bailleur</th>
			            <th>Agent recouvrement</th>
						<th></th>
			        </tr>
			        </thead>
			        <tbody id="ImmeubleTableBody">
					<tr th:each="immeub : ${immeublesPage.content}">
			            <input type="hidden" th:name="immeub.id" th:value="${immeub.id}" />
			            <td class="text-truncate" style="max-width: 250px;" th:text="${immeub.nomImmeuble}" th:title="${immeub.nomImmeuble}">residence</td>
						
						<td class="text-truncate" style="max-width: 250px;" th:with="bailleur=${immeub.bailleur}"
						    th:text="${bailleur != null} ? ${bailleur.nom} + ' ' + ${bailleur.prenom} : 'N/A'">
						    ali
						</td>								
						
						<td class="text-truncate" style="max-width: 250px;" th:with="utilisateur=${immeub.utilisateur}"
						    th:text="${utilisateur != null} ? ${utilisateur.nom} + ' ' + ${utilisateur.prenoms} : 'N/A'">
						    lamine
						</td>
						
						<td>
						    <div class="d-flex justify-content-center">
						        <div class="dropdown">
						            <button class="btn" type="button" id="dropdownMenuButton"
						                    data-bs-toggle="dropdown" aria-expanded="false">
						                <i class="bi bi-three-dots-vertical"></i>
						            </button>

						            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
						                <li>
						                    <a class="dropdown-item" th:href="@{'/patrimoines/edit/' + ${immeub.id}}">
						                        Modifier
						                    </a>
						                </li>
						                <li>
						                    <a class="dropdown-item del-btn" th:href="@{'/patrimoines/delete/' + ${immeub.id}}">
						                        Supprimer
						                    </a>
						                </li>
						            </ul>
						        </div>
						    </div>
						</td>

			        </tr>							
					
					<tr th:if="${#lists.isEmpty(immeublesPage.content)}">
					    <td colspan="4" class="text-center">Aucun patrimoine trouvé.</td>
					</tr>							
					
			        </tbody>
			    </table>
			</div>
			
			<!-- Pagination -->
				<div class="d-flex justify-content-center mt-3" th:if="${immeublesPage.totalElements > 0}">
				    <ul class="pagination">

				        <!-- Précédent -->
				        <li class="page-item"
				            th:classappend="${immeublesPage.first} ? 'disabled'">
				            <a class="page-link"
				               th:href="@{/patrimoines(page=${immeublesPage.number - 1})}">
				                &laquo;
				            </a>
				        </li>

				        <!-- Première page -->
				        <li class="page-item"
				            th:if="${immeublesPage.number > 2}">
				            <a class="page-link"
				               th:href="@{/patrimoines(page=0)}">1</a>
				        </li>

				        <!-- ... -->
				        <li class="page-item disabled"
				            th:if="${immeublesPage.number > 3}">
				            <span class="page-link">...</span>
				        </li>

				        <!-- Pages autour -->
				        <li class="page-item"
				            th:each="i : ${#numbers.sequence(
				                T(java.lang.Math).max(0, immeublesPage.number - 2),
				                T(java.lang.Math).min(immeublesPage.totalPages - 1, immeublesPage.number + 2)
				            )}"
				            th:classappend="${i == immeublesPage.number} ? 'active'">

				            <a class="page-link"
				               th:text="${i + 1}"
				               th:href="@{/patrimoines(page=${i})}">
				            </a>

				        </li>

				        <!-- ... -->
				        <li class="page-item disabled"
				            th:if="${immeublesPage.number < immeublesPage.totalPages - 4}">
				            <span class="page-link">...</span>
				        </li>

				        <!-- Dernière page -->
				        <li class="page-item"
				            th:if="${immeublesPage.number < immeublesPage.totalPages - 3}">
				            <a class="page-link"
				               th:href="@{/patrimoines(page=${immeublesPage.totalPages - 1})}"
				               th:text="${immeublesPage.totalPages}">
				            </a>
				        </li>

				        <!-- Suivant -->
				        <li class="page-item"
				            th:classappend="${immeublesPage.last} ? 'disabled'">
				            <a class="page-link"
				               th:href="@{/patrimoines(page=${immeublesPage.number + 1})}">
				                &raquo;
				            </a>
				        </li>

				    </ul>
				</div>				
				</fieldset>
			</div>
    
			<!-- SweetAlert2 -->
		    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	
			<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
					
			<script>
				document.addEventListener('DOMContentLoaded', function() {

				    document.querySelectorAll('.del-btn').forEach(btn => {
				        btn.addEventListener('click', function(e) {
				            e.preventDefault();
				            const href = this.href;

				            Swal.fire({
				                title: 'Confirmation',
				                text: "Voulez-vous supprimer ?",
				                icon: 'warning',
				                showCancelButton: true,
				                confirmButtonText: 'Oui',
				                cancelButtonText: 'Non'
				            }).then((result) => {
				                if (result.isConfirmed) {
				                    window.location.href = href;
				                }
				            });
				        });
				    });

				    // 🔥 message succès ici (en dehors du forEach)
				    const successDiv = document.getElementById('successMessage');
				    if (successDiv && successDiv.textContent.trim() !== '') {
				        Swal.fire({
				            icon: 'success',
				            title: 'Succès !',
				            text: successDiv.textContent.trim(),
				            confirmButtonText: 'OK'
				        });
				    }
				});
			</script>
			
		<script th:inline="javascript">
			document.addEventListener("DOMContentLoaded", function () {

			    const input = document.getElementById("searchInput");
			    const tableBody = document.getElementById("ImmeubleTableBody");
			    const loader = document.getElementById("loader");
			    const paginationContainer = document.querySelector(".pagination");
			    const contextPath = /*[[@{/}]]*/ "";

			    let timeout = null;
			    let currentKeyword = "";

			    function loadData(keyword = "", page = 0) {
			        loader.style.display = "block";
			        currentKeyword = keyword;

			        fetch(`${contextPath}patrimoines/api/search?keyword=${encodeURIComponent(currentKeyword)}&page=${page}`)
			            .then(res => res.json())
			            .then(data => {
			                loader.style.display = "none";
			                tableBody.innerHTML = "";

			                if (!data.content || data.content.length === 0) {
			                    tableBody.innerHTML = `
			                        <tr>
			                            <td colspan="4" class="text-center">Aucun patrimoine trouvé.</td>
			                        </tr>`;
			                    paginationContainer.innerHTML = "";
			                    return;
			                }

			                data.content.forEach(i => {
			                    tableBody.innerHTML += `
			                        <tr>
			                            <td>${i.nomImmeuble ?? ""}</td>
			                            <td>${i.bailleurNom ?? ""} ${i.bailleurPrenom ?? ""}</td>
			                            <td>${i.utilisateurNom ?? ""} ${i.utilisateurPrenoms ?? ""}</td>
			                            <td>
			                                <div class="dropdown">
			                                    <button class="btn" type="button" data-bs-toggle="dropdown">
			                                        <i class="bi bi-three-dots-vertical"></i>
			                                    </button>
			                                    <ul class="dropdown-menu">
			                                        <li><a class="dropdown-item" href="${contextPath}patrimoines/edit/${i.id}"><i class="bi bi-pencil me-2"></i>Modifier</a></li>
			                                        <li><a class="dropdown-item del-btn" href="${contextPath}patrimoines/delete/${i.id}"><i class="bi bi-trash me-2"></i>Supprimer</a></li>
			                                    </ul>
			                                </div>
			                            </td>
			                        </tr>`;
			                });

			                attachDeleteEvents();
			                buildPagination(data);
			            })
			            .catch(err => {
			                loader.style.display = "none";
			                console.error("Erreur AJAX :", err);
			            });
			    }

			    function attachDeleteEvents() {
			        document.querySelectorAll(".del-btn").forEach(btn => {
			            btn.addEventListener("click", function(e) {
			                e.preventDefault();
			                const href = this.href;
			                Swal.fire({
			                    title: 'Confirmation',
			                    text: "Voulez-vous supprimer ce patrimoine ?",
			                    icon: 'warning',
			                    showCancelButton: true,
			                    confirmButtonText: 'Oui',
			                    cancelButtonText: 'Non'
			                }).then((result) => {
			                    if (result.isConfirmed) window.location.href = href;
			                });
			            });
			        });
			    }

			    function buildPagination(data) {
			        paginationContainer.innerHTML = "";
			        if (data.totalPages <= 1) return;

			        for (let i = 0; i < data.totalPages; i++) {
			            paginationContainer.innerHTML += `
			                <li class="page-item ${i === data.number ? 'active' : ''}">
			                    <a class="page-link" href="#" data-page="${i}">${i + 1}</a>
			                </li>`;
			        }

			        paginationContainer.querySelectorAll(".page-link").forEach(link => {
			            link.addEventListener("click", function(e) {
			                e.preventDefault();
			                loadData(currentKeyword, parseInt(this.dataset.page));
			            });
			        });
			    }
				//
				
				
				function buildPagination(data) {
			        if (!paginationContainer) return;
			        paginationContainer.innerHTML = "";

			        const totalPages = data.totalPages;
			        const currentPage = data.number;

			        if (totalPages <= 1) return;

			        // Bouton précédent
			        paginationContainer.innerHTML += `
			            <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
			                <a class="page-link" href="#" data-page="${currentPage - 1}">&laquo;</a>
			            </li>`;

			        // Pages centrales
			        for (let i = 0; i < totalPages; i++) {
			            paginationContainer.innerHTML += `
			                <li class="page-item ${i === currentPage ? 'active' : ''}">
			                    <a class="page-link" href="#" data-page="${i}">${i + 1}</a>
			                </li>`;
			        }

			        // Bouton suivant
			        paginationContainer.innerHTML += `
			            <li class="page-item ${currentPage === totalPages - 1 ? 'disabled' : ''}">
			                <a class="page-link" href="#" data-page="${currentPage + 1}">&raquo;</a>
			            </li>`;

			        paginationContainer.querySelectorAll(".page-link").forEach(link => {
			            link.addEventListener("click", function(e) {
			                e.preventDefault();
			                const page = parseInt(this.dataset.page);
			                if (!isNaN(page)) loadData(currentKeyword, page);
			            });
			        });
			    }
				
				
			    input.addEventListener("keyup", function () {
			        clearTimeout(timeout);
			        timeout = setTimeout(() => loadData(input.value || "", 0), 400);
			    });

			    loadData();
			});
		</script>
	 </section>
</body>
</html>
