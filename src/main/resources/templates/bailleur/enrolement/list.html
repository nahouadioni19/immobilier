<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
    <!-- Fragment spécifique à cette page -->
    <section layout:fragment="content">
        <div class="container my-2">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>Gestion des bailleurs</h2>
                <a th:href="@{/bailleurs/create}" class="btn btn-primary">Nouveau</a>				
            </div>
			<hr style="border: 1px solid rgb(192, 192, 192);">
			
			<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
						
			<div class="row mb-3">
			    <div class="col-md-4">
			        <input type="text" id="searchInput"
			               class="form-control"
			               placeholder="Rechercher prénom, nom ou téléphone"
			               autocomplete="off">
			    </div>
			</div>
			
			<div id="bailleurTable">				
				<div id="loader" class="text-center my-3 d-none">
				    <div class="spinner-border text-primary"></div>
				    <div>Recherche en cours...</div>
				</div>
				
               <table class="table ">
                <thead class="table-success">
                    <tr>
                        <th>Prénom</th>
                        <th>Nom</th>
                        <th>Téléphone</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="bailleurTableBody">
                    <!-- Boucle sur les bailleurs -->
                    <tr th:each="bailleur : ${bailleursPage.content}">
                        <td th:text="${bailleur.prenom}"></td>
                        <td th:text="${bailleur.nom}"></td>
                        <td th:text="${bailleur.cellulaire}"></td>
                        <td>
                            <div class="dropdown">
                                <button class="btn" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li>
                                        <a class="dropdown-item" th:href="@{'/bailleurs/edit/' + ${bailleur.id}}">
                                            Modifier
                                        </a>
                                    </li>
                                    <li>
                                        <a class="dropdown-item del-btn" th:href="@{'/bailleurs/delete/' + ${bailleur.id}}">
                                            Supprimer
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </td>
                    </tr>

                    <!-- Message si aucun bailleur -->
                    <tr th:if="${#lists.isEmpty(bailleursPage.content)}">
                        <td colspan="4" class="text-center">Aucun bailleur trouvé.</td>
                    </tr>
                </tbody>
            </table>
	</div>
	
            <!-- Pagination -->
			<div class="d-flex justify-content-center mt-3">
			    <ul class="pagination" id="pagination"></ul>
			</div>
			
			</fieldset>
        </div>
		
		<!-- SweetAlert2 -->
		    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
			
			<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
					
			<script>
			document.addEventListener('DOMContentLoaded', function() {
			    // Sélectionner tous les boutons réinitialiser
			    document.querySelectorAll('.del-btn').forEach(btn => {
			        btn.addEventListener('click', function(e) {
			            e.preventDefault(); // empêcher le href="#"

			            const href = this.href;

			            Swal.fire({
			                title: 'Confirmation',
			                text: "Voulez-vous supprimer ?",
			                icon: 'warning',
			                showCancelButton: true,
			                confirmButtonText: 'Oui',
			                cancelButtonText: 'Non'
			            }).then((result) => {
			                if (result.isConfirmed) {
			                    // Redirection vers le controller
			                    window.location.href = href;
			                }
			            });
			        });
				
				// ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
				    const successDiv = document.getElementById('successMessage');
				    if (successDiv && successDiv.textContent.trim() !== '') {
				        const msg = successDiv.textContent.trim();
				        Swal.fire({
				            icon: 'success',
				            title: 'Succès !',
				            text: msg,
				            confirmButtonText: 'OK'
				        });
				    }
				});
			});
			</script>
			
			
			<script th:inline="javascript">
			document.addEventListener("DOMContentLoaded", function () {

			    const input = document.getElementById("searchInput");
			    const tableBody = document.getElementById("bailleurTableBody");
			    const loader = document.getElementById("loader");
			    //const paginationContainer = document.querySelector(".pagination");
				const paginationContainer = document.getElementById("pagination");

			    const contextPath = /*[[@{/}]]*/ "";

			    let timeout = null;
			    let currentPage = 0;
			    let currentKeyword = "";

			    // ===================== LOAD DATA =====================
			    function loadData(keyword, page = 0) {

			        console.log("LOAD PAGE =", page);

			        currentPage = page;        // ✅ IMPORTANT
			        currentKeyword = keyword;

			        loader.style.display = "block";

			        const url = contextPath + "bailleurs/api/search"
			            + "?keyword=" + encodeURIComponent(keyword)
			            + "&page=" + page;

			        fetch(url)
			            .then(res => res.json())
			            .then(data => {

			                loader.style.display = "none";

			                console.log("DATA PAGE =", data.number);

			                tableBody.innerHTML = "";

			                if (!data.content || data.content.length === 0) {
			                    tableBody.innerHTML = `
			                        <tr>
			                            <td colspan="4" class="text-center">
			                                Aucun bailleur trouvé.
			                            </td>
			                        </tr>`;
			                    paginationContainer.innerHTML = "";
			                    return;
			                }

			                // ===== TABLE =====
			                data.content.forEach(b => {
			                    tableBody.innerHTML += `
			                        <tr>
			                            <td>${b.prenom ?? ''}</td>
			                            <td>${b.nom ?? ''}</td>
			                            <td>${b.cellulaire ?? ''}</td>
			                            <td>
			                                <div class="dropdown">
			                                    <button class="btn" data-bs-toggle="dropdown">
			                                        <i class="bi bi-three-dots-vertical"></i>
			                                    </button>
			                                    <ul class="dropdown-menu">
			                                        <li>
			                                            <a class="dropdown-item"
			                                               href="${contextPath}bailleurs/edit/${b.id}">
			                                                Modifier
			                                            </a>
			                                        </li>
			                                        <li>
			                                            <a class="dropdown-item del-btn"
			                                               href="${contextPath}bailleurs/delete/${b.id}">
			                                                Supprimer
			                                            </a>
			                                        </li>
			                                    </ul>
			                                </div>
			                            </td>
			                        </tr>`;
			                });

			                attachDeleteEvents();
			                buildPagination(data);
			            })
			            .catch(err => {
			                loader.style.display = "none";
			                console.error("Erreur AJAX :", err);
			            });
			    }

			    // ===================== DELETE =====================
			    function attachDeleteEvents() {
			        document.querySelectorAll(".del-btn").forEach(btn => {
			            btn.onclick = function(e) {
			                e.preventDefault();
			                const href = this.href;

			                Swal.fire({
			                    title: 'Confirmation',
			                    text: "Voulez-vous supprimer ce bailleur ?",
			                    icon: 'warning',
			                    showCancelButton: true,
			                    confirmButtonText: 'Oui',
			                    cancelButtonText: 'Non'
			                }).then(result => {
			                    if (result.isConfirmed) {
			                        window.location.href = href;
			                    }
			                });
			            };
			        });
			    }

			    // ===================== PAGINATION =====================
				function buildPagination(data) {

				    paginationContainer.innerHTML = "";

				    const totalPages = data.totalPages;
				    const page = data.number;

				    if (!totalPages || totalPages <= 1) return;

				    // ⬅ PREVIOUS
				    paginationContainer.innerHTML += `
				        <li class="page-item ${page === 0 ? 'disabled' : ''}">
				            <a class="page-link" href="#" data-page="${page - 1}">&laquo;</a>
				        </li>`;

				    let start = Math.max(0, page - 2);
				    let end = Math.min(totalPages - 1, page + 2);

				    for (let i = start; i <= end; i++) {
				        paginationContainer.innerHTML += `
				            <li class="page-item ${i === page ? 'active' : ''}">
				                <a class="page-link" href="#" data-page="${i}">
				                    ${i + 1}
				                </a>
				            </li>`;
				    }

				    // ➡ NEXT
				    paginationContainer.innerHTML += `
				        <li class="page-item ${page === totalPages - 1 ? 'disabled' : ''}">
				            <a class="page-link" href="#" data-page="${page + 1}">&raquo;</a>
				        </li>`;

				    // EVENTS
				    paginationContainer.querySelectorAll(".page-link").forEach(link => {
				        link.onclick = function(e) {
				            e.preventDefault();

				            const targetPage = parseInt(this.dataset.page);

				            if (!isNaN(targetPage) &&
				                targetPage >= 0 &&
				                targetPage < totalPages) {

				                loadData(currentKeyword, targetPage);
				            }
				        };
				    });
				}

			    // ===================== SEARCH =====================
			    input.addEventListener("input", function () {
			        clearTimeout(timeout);

			        timeout = setTimeout(() => {
			            loadData(input.value, 0);
			        }, 400);
			    });

			    // ===================== INIT =====================
			    loadData("", 0);

			});
			</script>
		
    </section>

</body>
</html>
