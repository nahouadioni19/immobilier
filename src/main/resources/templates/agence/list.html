<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
	<section layout:fragment="content">
		
    	<div class="container my-2">
			
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Gestion des agences</h2>
            <div class="d-flex align-items-center">				
                <a th:href="@{/agences/create}" class="btn btn-primary">Nouveau</a>
            </div>
        </div>
		
		<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
					<h5>Liste des agences</h5> <br /> 
					<div id="agencesTable">
			            <table class="table">
			                <thead class="table-success">
			                <tr>
			                    <th>Code</th>
			                    <th>Désignation</th>
			                    <th>Action</th>
			                </tr>
			                </thead>
			                <tbody id="agenceeTableBody">
			                <tr th:each="agence : ${agencesPage.content}">
			                    <td th:text="${agence.code}">1</td>
			                    <td th:text="${agence.nom}">Banque Internationale</td>
			                    <td>
			                        <div class="d-flex justify-content-center">
			                            <div class="dropdown">
			                                <button class="btn" type="button" id="dropdownMenuButton"
			                                        data-bs-toggle="dropdown" aria-expanded="false">
			                                    <i class="bi bi-three-dots-vertical"></i>
			                                </button>
			                                <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
			                                    <li>
			                                        <a class="dropdown-item" th:href="@{'/agences/edit/' + ${agence.id}}">
			                                            <i class="bi bi-pencil me-2"></i>Modifier
			                                        </a>
			                                    </li>
			                                    <!--<li>
			                                        <a class="dropdown-item del-btn" th:href="@{'/agences/delete/' + ${agence.id}}">
			                                            <i class="bi bi-trash me-2"></i>Supprimer
			                                        </a>
			                                    </li>-->
			                                </ul>
			                            </div>
			                        </div>
			                    </td>
			                </tr>
			                <tr th:if="${#lists.isEmpty(agencesPage.content)}">
			                    <td colspan="4" class="text-center">Aucune agence trouvée.</td>
			                </tr>
			                </tbody>
			            </table>     
					</div>
					
		            <!-- Pagination -->
					<div class="d-flex justify-content-center mt-3" th:if="${agencesPage.totalElements > 0}">
					        <ul class="pagination">
					            <!-- Précédent -->
					            <li th:classappend="${agencesPage.first} ? 'disabled'" class="page-item">
					                <a class="page-link"
					                   th:href="@{/agences(page=${agencesPage.number - 1})}"><==</a>
					            </li>

					            <!-- Numéros de page -->
					            <li class="page-item"
					                th:each="i : ${#numbers.sequence(0, agencesPage.totalPages - 1)}"
					                th:classappend="${i == agencesPage.number} ? 'active'">
					                <a class="page-link"
					                   th:text="${i + 1}"
					                   th:href="@{/agences(page=${i})}"></a>
					            </li>

					            <!-- Suivant -->
					            <li th:classappend="${agencesPage.last} ? 'disabled'" class="page-item">
					                <a class="page-link"
					                   th:href="@{/agences(page=${agencesPage.number + 1})}">==></a>
					            </li>

					        </ul>
					    </div>
					</fieldset>
				</div>

				<script>
					document.addEventListener("DOMContentLoaded", function () {
					    const searchInput = document.getElementById("searchInput");
					    const tableContainer = document.getElementById("agencesPage");
					
					    searchInput.addEventListener("keyup", function () {
					        const keyword = this.value;
					
					        fetch(`/agences/search?keyword=${keyword}`)
					            .then(response => response.text())
					            .then(html => {
					                tableContainer.innerHTML = html; // remplacer la table
					            });
					    });
					});
				</script>
				
				<script>
				const searchInput = document.getElementById('searchInput');
				const tableBody = document.getElementById('agenceTableBody');
				
				searchInput.addEventListener('input', function() {
				    const keyword = this.value;
				
				    fetch(`/agences/search?keyword=${encodeURIComponent(keyword)}`)
				        .then(response => {
				            if (!response.ok) throw new Error('Erreur réseau');
				            return response.json(); // on attend JSON côté backend
				        })
				        .then(data => {
				            // On vide le tableau
				            tableBody.innerHTML = '';
				            
				            // On ajoute les nouvelles lignes
				            data.forEach(agence => {
				                const row = document.createElement('tr');
				                row.innerHTML = `
				                    <td>${agence.code}</td>
				                    <td>${agence.nom}</td>
				                `;
				                tableBody.appendChild(row);
				            });
				        })
				        .catch(error => console.error('Erreur:', error));
				});
				</script>
				
				<!-- SweetAlert2 -->
			    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
				
				<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
						
				<script>
				document.addEventListener('DOMContentLoaded', function() {
				    // Sélectionner tous les boutons réinitialiser
			    	document.querySelectorAll('.del-btn').forEach(btn => {
			        	btn.addEventListener('click', function(e) {
			            e.preventDefault(); // empêcher le href="#"

			            const href = this.href;

			            Swal.fire({
			                title: 'Confirmation',
			                text: "Voulez-vous supprimer ?",
			                icon: 'warning',
			                showCancelButton: true,
			                confirmButtonText: 'Oui',
			                cancelButtonText: 'Non'
			            }).then((result) => {
			                if (result.isConfirmed) {
			                    // Redirection vers le controller
			                    window.location.href = href;
			                }
			            });
			        });
				
				// ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
				    const successDiv = document.getElementById('successMessage');
				    if (successDiv && successDiv.textContent.trim() !== '') {
				        const msg = successDiv.textContent.trim();
				        Swal.fire({
				            icon: 'success',
				            title: 'Succès !',
				            text: msg,
				            confirmButtonText: 'OK'
				        });
				    }
				});
			});
			</script>

    </section>
</body>
</html>
