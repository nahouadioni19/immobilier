<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Dashboard</title>
</head>

<body>
<section layout:fragment="content">
    <div class="container my-4">
        <h2 class="mb-4">Dashboard Recouvrements</h2>

        <div class="row">
            <!-- Cartes statistiques -->
            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Baux actifs</h5>
                        <p class="card-text fs-4" th:text="${bailsActifs}">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Baux résiliés</h5>
                        <p class="card-text fs-4" th:text="${bailsResilies}">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Locataires</h5>
                        <p class="card-text fs-4" th:text="${totalLocataires}">0</p>
                    </div>
                </div>
            </div>

            <div class="col-md-3 mb-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h5 class="card-title">Recouvrements</h5>
                        <p class="card-text fs-4" th:text="${totalRecouvrements}">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Graphique loyers -->
        <div class="card mt-4">
            <div class="card-body">
                <h5 class="card-title">Évolution des loyers encaissés</h5>
                <canvas id="chartLoyers" width="400" height="200"></canvas>
            </div>
        </div>
    </div>
		
		<!-- Chart.js -->
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		
		<script th:inline="javascript">
		/*<![CDATA[*/
		    const labels = /*[[${mois}]]*/ [];
		    const data = /*[[${loyers}]]*/ [];
		
		    new Chart(document.getElementById('chartLoyers'), {
		        type: 'line',
		        data: {
		            labels: labels,
		            datasets: [{
		                label: 'Loyers encaissés (FCFA)',
		                data: data,
		                borderColor: 'rgb(75, 192, 192)',
		                tension: 0.3,
		                fill: false
		            }]
		        },
		        options: {
		            responsive: true,
		            plugins: {
		                legend: {
		                    display: true,
		                    position: 'top'
		                }
		            },
		            scales: {
		                y: {
		                    beginAtZero: true
		                }
		            }
		        }
		    });
		/*]]>*/
		</script>
	</section>
</body>
</html>
