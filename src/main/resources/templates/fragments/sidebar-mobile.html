<div th:fragment="sidebarMobile">

    <!-- Mobile Toggle Button -->
    <button id="toggleSidebar"
            class="btn btn-dark d-lg-none m-2"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarOffcanvas"
            aria-controls="sidebarOffcanvas">
        ☰ SIGimmo
    </button>

    <!-- Mobile Offcanvas -->
    <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 id="sidebarOffcanvasLabel">SIGimmo</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
        </div>
        <div class="offcanvas-body">
            <div th:replace="~{fragments/menu :: menu}"></div>
        </div>
    </div>

    <!-- JS pour toggle mobile -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleButton = document.getElementById('toggleSidebar');
            const mobileSidebar = document.getElementById('sidebarOffcanvas');
            if (toggleButton && mobileSidebar) {
                const bsSidebar = new bootstrap.Offcanvas(mobileSidebar);
                toggleButton.addEventListener('click', () => bsSidebar.toggle());
            }
        });
    </script>
</div>
