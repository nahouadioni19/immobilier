<div th:fragment="sidebarDesktop">
    <nav class="sidebar bg-dark text-white d-none d-lg-block position-fixed h-100 p-3" style="width: 250px;">
        <div th:replace="~{fragments/menu :: menu}"></div>
    </nav>
</div>

<div th:fragment="sidebarMobile">
    <!-- Mobile Toggle Button 
    <button id="toggleSidebar"
            class="btn btn-dark d-lg-none m-2"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#sidebarOffcanvas"
            aria-controls="sidebarOffcanvas">
        ☰ SIGimmo
    </button>-->

    <!-- Mobile Sidebar Offcanvas -->
    <div class="offcanvas offcanvas-start d-lg-none bg-dark text-white" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
        <div class="offcanvas-header bg-dark text-white">
            <h5 id="sidebarOffcanvasLabel">SIGimmo</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
        </div>
        <div class="offcanvas-body bg-dark text-white p-0">
            <div th:replace="~{fragments/menu :: menu}" class="text-white"></div>
        </div>
    </div>

    <!-- Mobile Toggle JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggleButton = document.getElementById('toggleSidebar');
            const mobileSidebarEl = document.getElementById('sidebarOffcanvas');
            if(toggleButton && mobileSidebarEl) {
                const mobileSidebar = new bootstrap.Offcanvas(mobileSidebarEl);
                toggleButton.addEventListener('click', () => mobileSidebar.toggle());
            }
        });
    </script>

</div>

<!-- Forcer le texte des liens en blanc -->
<style>
    /* Menu mobile */
    #sidebarOffcanvas .offcanvas-body a{
        color:#ffffff !important;
    }

    /* Flèche */
    .menu-arrow{
        font-size:12px;
        transition:transform .2s ease;
        user-select:none;
    }

    .menu-arrow.rotate{
        transform:rotate(90deg);
    }

    /* Menus principaux */
    .sidebar .nav-link{
        color:#e9ecef;
        border-radius:8px;
        margin-bottom:3px;
    }

    .sidebar .nav-link:hover{
        background:#343a40;
        color:#ffffff;
    }

    .sidebar .nav-link.active{
        background:#0d6efd;
        color:#fff !important;
        font-weight:600;
    }

    /* Alignement des icônes */
    .nav-link i{
        width:20px;
        text-align:center;
        margin-right:8px;
    }

    /* Sous-menus */
    .collapse .nav-link{
        display:flex;
        align-items:center;
        padding-left:1.5rem;
        font-size:0.95rem;
        transition:all .2s ease;
    }

    /* Menus parents */
    a[data-bs-toggle="collapse"]{
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    /* Sous-menu actif */
    .sidebar .collapse .nav-link.active{
        background:#e7f1ff;
        color:#0d6efd !important;
        font-weight:600;
        border-left:4px solid #0d6efd;
    }
</style>
