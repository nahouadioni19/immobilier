<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container-fluid">

        <!-- BOUTON TOGGLE SIDEBAR MOBILE (<992px) -->
        <button class="btn btn-outline-light d-lg-none me-2" id="toggleSidebar" type="button">
            ☰
        </button>

        <!-- NOM DE L’APPLICATION -->
        <a class="navbar-brand" href="#">SIGimmo</a>

        <!-- Toggle du menu navbar (pour collapsible items si nécessaire) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Contenu utilisateur à droite -->
        <div class="ms-auto d-flex align-items-center">
            <div class="dropdown">
                <a class="d-flex align-items-center" href="#" role="button"
                   id="userMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                    <img th:src="@{/images/user-placeholder.png}" alt="Utilisateur" class="rounded-circle me-2" width="32" height="32">
                </a>

                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuButton">
                    <li>
                        <a class="dropdown-item">
                             <span th:text="${currentUserFullName != null ? currentUserFullName : 'Invité'}">Utilisateur</span>
                        </a>
                    </li>
                    <hr>
                    <li>
                        <a class="dropdown-item" th:href="@{/utilisateurs/change-password}" onclick="showLoading()">
                            <i class="bi bi-key me-1"></i> Changer le mot de passe
                        </a>
                    </li>
                    <hr>
                    <li>
                        <form th:action="@{/sign-out}" method="post" onsubmit="showLoading()">
                            <input type="hidden" th:if="${_csrf != null}"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />
                            <button type="submit" class="dropdown-item">
                                <i class="bi bi-box-arrow-right me-1"></i> Déconnexion
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Animation de chargement -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <p>Chargement...</p>
    </div>

    <style>
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #28a745;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading-overlay").style.display = "flex";
        }
    </script>
</nav>
