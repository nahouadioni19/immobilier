<head th:fragment="head">
    <meta charset="UTF-8">
    <title>Immobilier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ Bootstrap officiel depuis CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ Icônes Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- ✅ Feuilles de style locales -->
    <!-- (Ne pas recharger bootstrap en local s’il est déjà chargé via CDN, sinon risque de conflit) -->
    <link rel="stylesheet" th:href="@{/css/style1.css}">

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/massi_logo.png}">

    <!-- ✅ Styles additionnels spécifiques au layout -->
    <style>
        /* === Mise en page principale === */
        .main-content {
            margin-left: 250px;
            padding: 20px;
            transition: margin-left 0.3s ease-in-out;
        }

        /* === Sidebar === */
        .sidebar {
            width: 250px;
            overflow-y: auto;
            z-index: 1040; /* Desktop */
        }

        /* === Offcanvas (sidebar mobile) === */
        .offcanvas {
            width: 250px;
            z-index: 1055; /* Mobile */
        }

        /* === Responsive : sur mobile, pas de marge gauche === */
        @media (max-width: 991.98px) {
            .main-content {
                margin-left: 0;
            }
        }		
		
    </style>
</head>
