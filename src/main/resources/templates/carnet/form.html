<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
    <section layout:fragment="content">
        <!-- Ton contenu principal ici -->
		<div class="container my-2">
			<div class="container mt-4">
			    <h2>Gestion des carnets</h2>

				<form th:action="@{/carnets/save}" th:object="${carnetDto}" method="post" 
												class="border p-4 rounded shadow-sm bg-white" id="carnetForm">
				    <input type="hidden" th:field="*{id}" />
	<!--				<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">-->
				    <div class="row">
				        <div class="col-sm-6 col-md-4">
				            <div class="mb-3 form-group">
				                <label for="utilisateurId" class="form-label">Agent recouvrement</label>
				                <select th:field="*{utilisateurId}" class="form-select" required>
				                    <option value="">-- Choisir un agent --</option>
				                    <option th:each="user : ${utilisateurs}"
				                            th:value="${user.id}"
				                            th:text="${user.nom + ' ' + user.prenoms}">
				                    </option>
				                </select>
				            </div>
				        </div>

				        <div class="col-sm-6 col-md-4">
				            <div class="mb-3 form-group">
				                <label for="carNumDeb" class="form-label">N° début</label>
				                <input type="text" th:field="*{carNumDeb}" class="form-control" required>
				                <div class="text-danger" th:if="${#fields.hasErrors('carNumDeb')}" th:errors="*{carNumDeb}"></div>
				            </div>
				        </div>

				        <div class="col-sm-6 col-md-4">
				            <div class="mb-3 form-group">
				                <label for="carNumFin" class="form-label">N° fin</label>
				                <input type="text" th:field="*{carNumFin}" class="form-control" required>
				                <div class="text-danger" th:if="${#fields.hasErrors('carNumFin')}" th:errors="*{carNumFin}"></div>
				            </div>
				        </div>
				    </div>

				    <hr>
				    <div class="mt-3 row g-2">
				        <div class="col-12 col-md-2">
				            <button type="submit" class="btn btn-primary w-100">
				                <span th:text="*{id} == null ? 'Enregistrer' : 'Modifier'"></span>
				            </button>
				        </div>
				        <div class="col-12 col-md-2">
				            <a th:href="@{/carnets}" class="btn btn-danger w-100">
				                Retour à la liste
				            </a>
				        </div>
				    </div>
					<!--</fieldset>-->
				</form>
			</div>
		 </div>
	
		<script>
			//AFFICHE LA PREMIERE LETTRE EN MAJUSCULE
			function capitalizeWords(input) {
			    input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
			        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
			    });
			}
		
			//METTRE TOUT LE MOT EN MAJUSCULE
			function uppercaseWords(input){
				input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
					return word.charAt(0).toUpperCase() + word.slice(1).toUpperCase();
				});
			}
		</script>
	
		<script>
		function validateCarnet() {
		    const deb = parseInt(document.getElementById("carNumDeb").value, 10);
		    const fin = parseInt(document.getElementById("carNumFin").value, 10);
	
		    if (!isNaN(deb) && !isNaN(fin) && deb > fin) {
		        alert("⚠️ Le numéro de début ne peut pas être supérieur au numéro de fin !");
		        return false; // empêche le submit
		    }
		    return true;
		}
		</script>
		
		<!-- ✅ SweetAlert2 -->
	    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
	    <!-- ⚠️ Boîte de confirmation avant envoi -->
	    <script>
	        document.getElementById('carnetForm').addEventListener('submit', function (e) {
	            e.preventDefault(); // Bloque l’envoi automatique
	            const form = this;
	      //      const isEdit = form.querySelector('input[name="id"]').value !== "";
		  const idField = form.querySelector('input[name="id"]');
			const idValue = idField ? idField.value.trim() : "";
			console.log("ID trouvé :", idValue);
        // ✅ Création si id vide ou null
	        const isEdit = idValue !== null && idValue !== "" && idValue !== "0";
	        console.log("isEdit =", isEdit);

	            Swal.fire({
	                title: isEdit ? 'Confirmation' : 'Confirmation',
	                text: isEdit ? 'Voulez-vous modifier ?' : 'Voulez-vous enregistrer ?',
	                icon: 'question',
	                showCancelButton: true,
	                confirmButtonText: 'Oui',
	                cancelButtonText: 'Non',
	                reverseButtons: true
	            }).then((result) => {
	                if (result.isConfirmed) {
	                    form.submit(); // Si confirmé → on envoie le formulaire
	                }
	            });
	        
				// ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
			    const successDiv = document.getElementById('successMessage');
			    if (successDiv && successDiv.textContent.trim() !== '') {
			        const msg = successDiv.textContent.trim();
			        Swal.fire({
			            icon: 'success',
			            title: 'Succès !',
			            text: msg,
			            confirmButtonText: 'OK'
			        });
			    }
			});
	    </script>
		
    </section>
	
</body>
</html>
