<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tableau de bord</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .dashboard-card{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,.08);
            transition:.3s;
        }

        .dashboard-card:hover{
            transform:translateY(-3px);
        }

        .stat-number{
            font-size:2rem;
            font-weight:bold;
        }

        .chart-container{
            height:350px;
        }
    </style>
</head>
<body>

	<div class="container-fluid py-4">
	
	    <div class="mb-4">
	        <h2>🏢 Tableau de bord immobilier</h2>
	        <p class="text-muted">
	            Vue globale de votre activité immobilière
	        </p>
	    </div>
	
	    <!-- =========================
	         LIGNE 1
	    ========================== -->
	    <div class="row g-3">
	
	        <div class="col-md-3">
	            <div class="card dashboard-card bg-primary text-white">
	                <div class="card-body text-center">
	                    <h6>Appartements</h6>
	                    <div class="stat-number"
	                         th:text="${dashboard.totalAppartements}">
	                    </div>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card dashboard-card bg-success text-white">
	                <div class="card-body text-center">
	                    <h6>Occupés</h6>
	                    <div class="stat-number"
	                         th:text="${dashboard.appartementsOccupes}">
	                    </div>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card dashboard-card bg-warning text-dark">
	                <div class="card-body text-center">
	                    <h6>Disponibles</h6>
	                    <div class="stat-number"
	                         th:text="${dashboard.appartementsDisponibles}">
	                    </div>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-3">
	            <div class="card dashboard-card bg-info text-white">
	                <div class="card-body text-center">
	                    <h6>Taux occupation</h6>
	                    <div class="stat-number">
	                        <span th:text="${#numbers.formatDecimal(dashboard.tauxOccupation,1,2)}"></span>%
	                    </div>
	                </div>
	            </div>
	        </div>
	
	    </div>
	
	    <!-- =========================
	         LIGNE 2
	    ========================== -->
	
	    <div class="row g-3 mt-2">
	
	        <div class="col-md-4">
	            <div class="card dashboard-card">
	                <div class="card-body text-center">
	                    <h6>Baux actifs</h6>
	                    <h2 class="text-success"
	                        th:text="${dashboard.bauxActifs}">
	                    </h2>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-4">
	            <div class="card dashboard-card">
	                <div class="card-body text-center">
	                    <h6>Baux résiliés</h6>
	                    <h2 class="text-danger"
	                        th:text="${dashboard.bauxResilies}">
	                    </h2>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-4">
	            <div class="card dashboard-card">
	                <div class="card-body text-center">
	                    <h6>Locataires</h6>
	                    <h2 class="text-primary"
	                        th:text="${dashboard.totalLocataires}">
	                    </h2>
	                </div>
	            </div>
	        </div>
	
	    </div>
	
	    <!-- =========================
	         GRAPHIQUE
	    ========================== -->
	
	    <div class="row mt-4">
	
	        <div class="col-md-6">
	            <div class="card dashboard-card">
	                <div class="card-header">
	                    Répartition des appartements
	                </div>
	                <div class="card-body">
	                    <div class="chart-container">
	                        <canvas id="occupationChart"></canvas>
	                    </div>
	                </div>
	            </div>
	        </div>
	
	        <div class="col-md-6">
	            <div class="card dashboard-card">
	                <div class="card-header">
	                    Résumé
	                </div>
	                <div class="card-body">
	
	                    <table class="table table-bordered">
	                        <tr>
	                            <th>Appartements</th>
	                            <td th:text="${dashboard.totalAppartements}"></td>
	                        </tr>
	
	                        <tr>
	                            <th>Occupés</th>
	                            <td th:text="${dashboard.appartementsOccupes}"></td>
	                        </tr>
	
	                        <tr>
	                            <th>Disponibles</th>
	                            <td th:text="${dashboard.appartementsDisponibles}"></td>
	                        </tr>
	
	                        <tr>
	                            <th>Locataires</th>
	                            <td th:text="${dashboard.totalLocataires}"></td>
	                        </tr>
	
	                        <tr>
	                            <th>Baux actifs</th>
	                            <td th:text="${dashboard.bauxActifs}"></td>
	                        </tr>
	
	                        <tr>
	                            <th>Baux résiliés</th>
	                            <td th:text="${dashboard.bauxResilies}"></td>
	                        </tr>
	
	                    </table>
	
	                </div>
	            </div>
	        </div>
	
	    </div>
	
	</div>

	<script th:inline="javascript">
	
		const occupes = /*[[${dashboard.appartementsOccupes}]]*/ 0;
		const disponibles = /*[[${dashboard.appartementsDisponibles}]]*/ 0;
	
	new Chart(
	    document.getElementById('occupationChart'),
	    {
	        type: 'doughnut',
	        data: {
	            labels: ['Occupés', 'Disponibles'],
	            datasets: [{
	                data: [occupes, disponibles]
	            }]
	        },
	        options: {
	            responsive: true,
	            maintainAspectRatio: false
	        }
	    }
	);
	
	</script>

</body>
</html>
