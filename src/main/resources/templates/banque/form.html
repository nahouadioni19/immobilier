<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<section layout:fragment="content">

    <style>
        :root{
            --bq-navy:#1B2A4A;
            --bq-navy-light:#28406e;
            --bq-gold:#C9A24B;
            --bq-bg:#F5F6F8;
            --bq-border:#E1E4EA;
            --bq-text:#25324B;
            --bq-muted:#7C879C;
        }

        .bq-wrapper{
            background:var(--bq-bg);
            padding:2.5rem 1rem;
            min-height:100%;
        }

        .bq-shell{
            max-width:920px;
            margin:0 auto;
        }

        .bq-eyebrow{
            text-transform:uppercase;
            letter-spacing:.08em;
            font-size:.75rem;
            color:var(--bq-gold);
            font-weight:600;
            margin-bottom:.25rem;
        }

        .bq-title{
            color:var(--bq-navy);
            font-weight:700;
            font-size:1.75rem;
            margin-bottom:1.75rem;
        }

        .bq-grid{
            display:grid;
            grid-template-columns:1.3fr 1fr;
            gap:1.75rem;
            align-items:start;
        }

        @media (max-width:840px){
            .bq-grid{ grid-template-columns:1fr; }
        }

        .bq-card{
            background:#fff;
            border:1px solid var(--bq-border);
            border-radius:14px;
            padding:2rem;
            box-shadow:0 1px 3px rgba(27,42,74,.04);
        }

        .bq-field{
            position:relative;
            margin-bottom:1.5rem;
        }

        .bq-field label{
            display:block;
            font-size:.82rem;
            font-weight:600;
            color:var(--bq-navy);
            margin-bottom:.4rem;
        }

        .bq-field .bq-hint{
            font-size:.76rem;
            color:var(--bq-muted);
            margin-top:.35rem;
        }

        .bq-input{
            width:100%;
            border:1.5px solid var(--bq-border);
            border-radius:9px;
            padding:.65rem .9rem;
            font-size:1rem;
            color:var(--bq-text);
            background:#fbfbfc;
            transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
        }

        .bq-input:focus{
            outline:none;
            border-color:var(--bq-navy-light);
            background:#fff;
            box-shadow:0 0 0 3px rgba(40,64,110,.12);
        }

        .bq-input.bq-sigle{
            letter-spacing:.06em;
            font-weight:700;
        }

        .bq-actions{
            display:flex;
            gap:.75rem;
            margin-top:2rem;
            padding-top:1.5rem;
            border-top:1px solid var(--bq-border);
        }

        .bq-btn{
            border:none;
            border-radius:9px;
            padding:.7rem 1.4rem;
            font-weight:600;
            font-size:.95rem;
            cursor:pointer;
            transition:transform .1s ease, opacity .15s ease;
            text-decoration:none;
            display:inline-flex;
            align-items:center;
            justify-content:center;
        }

        .bq-btn:hover{ opacity:.92; }
        .bq-btn:active{ transform:scale(.98); }

        .bq-btn-primary{
            background:var(--bq-navy);
            color:#fff;
        }

        .bq-btn-secondary{
            background:#fff;
            color:var(--bq-navy);
            border:1.5px solid var(--bq-border);
        }

        /* Aperçu carte banque, mis à jour en direct */
        .bq-preview{
            background:linear-gradient(135deg, var(--bq-navy) 0%, var(--bq-navy-light) 100%);
            border-radius:14px;
            padding:1.75rem;
            color:#fff;
            min-height:180px;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            position:relative;
            overflow:hidden;
        }

        .bq-preview::after{
            content:"";
            position:absolute;
            right:-40px;
            top:-40px;
            width:140px;
            height:140px;
            border-radius:50%;
            background:rgba(201,162,75,.15);
        }

        .bq-preview-label{
            text-transform:uppercase;
            letter-spacing:.08em;
            font-size:.68rem;
            color:rgba(255,255,255,.6);
            margin-bottom:.4rem;
        }

        .bq-preview-sigle{
            font-size:1.9rem;
            font-weight:700;
            letter-spacing:.03em;
            line-height:1.1;
            word-break:break-word;
        }

        .bq-preview-libelle{
            font-size:.92rem;
            color:rgba(255,255,255,.85);
            margin-top:.35rem;
        }

        .bq-preview-chip{
            width:34px;
            height:24px;
            border-radius:5px;
            background:rgba(201,162,75,.85);
            position:relative;
            z-index:1;
        }
    </style>

    <div class="bq-wrapper">
        <div class="bq-shell">
            <div class="bq-eyebrow">Référentiel</div>
            <h2 class="bq-title">Gestion des banques</h2>

            <form th:action="@{/banques/save}" th:object="${banque}" method="post" id="banqueForm">
                <input type="hidden" th:field="*{bancode}"/>

                <div class="bq-grid">
                    <!-- Carte du formulaire -->
                    <div class="bq-card">
                        <div class="bq-field">
                            <label for="bansigle">Sigle</label>
                            <input type="text" th:field="*{bansigle}" id="bansigle"
                                   class="bq-input bq-sigle" placeholder="Ex : BICICI"
                                   required oninput="uppercaseWords(this); updatePreview();">
                            <div class="bq-hint">Abréviation officielle de la banque, en majuscules.</div>
                        </div>

                        <div class="bq-field">
                            <label for="banlibelle">Désignation</label>
                            <input type="text" th:field="*{banlibelle}" id="banlibelle"
                                   class="bq-input" placeholder="Nom complet de la banque"
                                   required oninput="capitalizeWords(this); updatePreview();">
                            <div class="bq-hint">Raison sociale complète telle qu'elle apparaîtra dans les documents.</div>
                        </div>

                        <div class="bq-actions">
                            <button type="submit" class="bq-btn bq-btn-primary">
                                <span th:text="*{bancode} == null ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
                            </button>
                            <a th:href="@{/banques}" class="bq-btn bq-btn-secondary">Retour à la liste</a>
                        </div>
                    </div>

                    <!-- Aperçu en direct -->
                    <div class="bq-preview">
                        <div class="bq-preview-chip"></div>
                        <div>
                            <div class="bq-preview-label">Aperçu</div>
                            <div class="bq-preview-sigle" id="previewSigle">SIGLE</div>
                            <div class="bq-preview-libelle" id="previewLibelle">Désignation de la banque</div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- JS pour majuscules / capitalisation -->
    <script>
        function capitalizeWords(input) {
            input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
                return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
            });
        }

        function uppercaseWords(input){
            input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
                return word.charAt(0).toUpperCase() + word.slice(1).toUpperCase();
            });
        }

        function updatePreview(){
            const sigle = document.getElementById('bansigle').value.trim();
            const libelle = document.getElementById('banlibelle').value.trim();
            document.getElementById('previewSigle').textContent = sigle !== '' ? sigle : 'SIGLE';
            document.getElementById('previewLibelle').textContent = libelle !== '' ? libelle : 'Désignation de la banque';
        }

        document.addEventListener('DOMContentLoaded', updatePreview);
    </script>

    <!-- ✅ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>

    <!-- ⚠️ Boîte de confirmation avant envoi -->
    <script>
        document.getElementById('banqueForm').addEventListener('submit', function (e) {
            e.preventDefault(); // Bloque l'envoi automatique
            const form = this;
            const idField = form.querySelector('input[name="id"]');
            const idValue = idField ? idField.value.trim() : "";
            console.log("ID trouvé :", idValue);
            // ✅ Création si id vide ou null
            const isEdit = idValue !== null && idValue !== "" && idValue !== "0";
            console.log("isEdit =", isEdit);

            Swal.fire({
                title: 'Confirmation',
                text: isEdit ? 'Voulez-vous modifier ?' : 'Voulez-vous enregistrer ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Oui',
                cancelButtonText: 'Non',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    form.submit(); // Si confirmé → on envoie le formulaire
                }
            });

            // ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
            const successDiv = document.getElementById('successMessage');
            if (successDiv && successDiv.textContent.trim() !== '') {
                const msg = successDiv.textContent.trim();
                Swal.fire({
                    icon: 'success',
                    title: 'Succès !',
                    text: msg,
                    confirmButtonText: 'OK'
                });
            }
        });
    </script>

</section>
</body>
</html>
