<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
	  
	  <style>
	  /* Container */
	  .select2-container {
	      width: 100% !important;
	  }

	  /* Hauteur identique à .form-control Bootstrap */
	  .select2-container .select2-selection--single {
	      height: 38px !important;
	      padding: 0.375rem 0.75rem !important;
	      border: 1px solid #ced4da;
	      border-radius: 0.375rem;
	  }

	  /* Texte centré verticalement */
	  .select2-container--default .select2-selection--single .select2-selection__rendered {
	      line-height: 24px !important;
	      padding-left: 0 !important;
	  }

	  /* Flèche */
	  .select2-container--default .select2-selection--single .select2-selection__arrow {
	      height: 36px !important;
	      top: 1px !important;
	  }
	  </style>
  <body>
	  <section layout:fragment="content">
	      <div class="container my-2">
	          <div class="container mt-4">
				<h2>Ajouter un recouvrement</h2>
	              <form th:action="@{/recouvrements/save}" th:object="${encaisse}" method="post" 
	                    class="border p-4 rounded shadow-sm bg-white" id="encaisseForm">
	                  
	                  
	                  <input type="hidden" th:field="*{id}" id="encaisseId"/>
	                  <input type="hidden" th:field="*{version}"/>
					  
					  <!-- Hidden fields pour selects dynamiques -->
	  				   <!--<input type="text" th:field="*{utilisateur.id}" id="hiddenAgent">-->
					   
					   <input type="hidden" th:field="*{utilisateur.id}" id="hiddenAgent" th:data-user-id="${#authentication.principal.id}">
					   
	  				   <!--<input type="hidden" th:field="*{bail.id}" id="hiddenBail">
	  				   <input type="hidden" th:field="*{identification.id}" id="hiddenIdentification">-->
	
	  				    <!-- Hidden fields calculs -->
	  				   <input type="hidden" th:field="*{encloyer}" id="conloyerInput">
	  				   <input type="hidden" th:field="*{encArriere}" id="arriereInput">
	  				   <input type="hidden" th:field="*{encPenalite}" id="penaliteInput">
	  				   <input type="hidden" th:field="*{enctotal}" id="totalInput">
	  				   <input type="hidden" th:field="*{encDeb}" id="arrieredInput">
	  				   <input type="hidden" th:field="*{encFin}" id="arrierefInput">
	  				   <input type="hidden" th:field="*{encMontant}" id="montantInput">

	                  <!--<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">-->
	                      
	                      <!-- Agent de recouvrement -->
	                      <div class="row" th:if="! ${userRoles.contains('RECOUV')}"><!--th:if="${#sets.contains(userRoles, 'NSI')}">-->	                         
                              <div class="mb-1">
								  <label for="utilisateur" class="form-label">
	  								    <span style="font-style: italic;">Agent de recouvrement</span>
	  								    <span class="text-danger">*</span>
	  							  </label>									  
								  <select id="agentSelect" class="form-select" >
										<option value="9999999">-- Choix --</option>
	  						            <option value="">Tous les agents</option>
	  						            <option th:each="u : ${utilisateurs}"
	  						                    th:value="${u.id}"
	  						                    th:text="|${u.prenoms} ${u.nom}|">
	  						            </option>
	  						       </select>
                              </div>
	                      </div>

	                      <!-- Bail / Locataire -->
						  
		                      <div class="mb-1">
								<label for="encDate" class="form-label">
								    <span style="font-style: italic;">Date de recouvrement</span>
								    <span class="text-danger">*</span>
								</label>
	                              <input type="date" id="encDate" th:field="*{encDate}" class="form-control" required 
								  					th:attr="max=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" />
	                          </div>
	
							<div class="mb-1">
								<label class="form-label">
								    <span style="font-style: italic;">Locataire</span>
								    <span class="text-danger">*</span>
								</label>

								<select th:field="*{bail.id}" id="bail" class="form-select" style="width:100%" required>
								    <option value="">-- Choisir le locataire --</option>
								</select>

							</div>
						
						
							<div class="mb-1">
	                              <label>								
										<span style="font-style: italic;">Numéro de reçu</span>
										<span class="text-danger">*</span>								
								  </label>
								  <select th:field="*{identification.id}" id="identification" class="form-select" style="width:100%" required>
								      <option value="">-- Choisir le numéro de quittance --</option>
								  </select>
		                      </div>      
	
		                      <!-- Arriérés / Loyer / Pénalités / Total -->
	                      	  <div class="mb-1">
	                              <label>
										<span style="font-style: italic;">Arriéré(s) FCFA</span>
										<span class="text-danger"></span>									
								  </label>
	                              <input type="text" id="arriereDisplay" class="form-control" disabled>                              
	                          </div>
						  
						  
	                          <div class="mb-1">
	                              <label>
										<span style="font-style: italic;">De</span>
										<span class="text-danger"></span>
								  </label>
	                              <input type="text" id="arriereDebut" class="form-control" disabled>
	                          </div>
								  
	                          <div class="mb-1">
	                              <label>
										<span style="font-style: italic;">A</span>
										<span class="text-danger"></span>
								  </label>
	                              <input type="text" id="arriereFin" class="form-control" disabled>
		                      </div>
						  
						  
		                      <div class="mb-1">
	                              <label>
									<span style="font-style: italic;">Loyer FCFA</span>
									<span class="text-danger"></span>
								  </label>
	                              <input type="text" id="conloyer" class="form-control" disabled>
	                          </div>
								  
	                          <div class="mb-1">
	                              <label>
									<span style="font-style: italic;">Pénalité retard (FCFA)</span>
									<span class="text-danger"></span>
								  </label>
	                              <input type="text" id="penaliteDisplay" class="form-control" disabled>
	                          </div>
						  
	                          <div class="mb-1">
	                              <label>
									<span style="font-style: italic;">Total à payer (FCFA)</span>
									<span class="text-danger"></span>
								  </label>
	                              <input type="text" id="totalDisplay" class="form-control" disabled>
		                      </div>
	
		                      <!-- Montant payé / Mode / Quittance -->
		                      <div class="mb-1">
	                              <label>
									<span style="font-style: italic;">Montant payé</span>
									<span class="text-danger">*</span>
								  </label>
	                              <input type="text" id="montantDisplay" class="form-control" placeholder="0">
	                          </div>
						  
						  
                          <div class="mb-1">
                              <label>
								<span style="font-style: italic;">Mode de paiement</span>
								<span class="text-danger">*</span>
							  </label>
                              <select th:field="*{encMode}" id="encMode" class="form-select" required>
                                  <option value="">-- Choisir le mode --</option>
                                  <option value="ESPÈCES">Espèces</option>
                                  <option value="CHÈQUE">Chèque</option>
                                  <option value="VIREMENT">Virement</option>
                                  <option value="MOBILE MONEY">Mobile Money</option>
                              </select>
                          </div>
						  
	                      <!-- Boutons -->
	                      <div class="mt-3 row g-2">
	                          <div class="col-12 col-md-2">
	                              <button type="submit" class="btn btn-primary w-100">
	                                  <span th:text="*{id} == null ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
	                              </button>
	                          </div>
	                          <div class="col-12 col-md-2">
	                              <a th:href="@{/recouvrements}" class="btn btn-danger w-100">Retour à la liste</a>
	                          </div>
	                      </div>

	                  <!--</fieldset>-->
	              </form>
	          </div>
	      </div>
		  
		  <!-- ✅ SweetAlert2 -->
		  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		  <div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
		  <!-- ⚠️ Boîte de confirmation avant envoi -->
		  <script>
		      document.getElementById('encaisseForm').addEventListener('submit', function (e) {
		          e.preventDefault(); // Bloque l’envoi automatique
		          const form = this;
		      //    const isEdit = form.querySelector('input[name="id"]').value !== "";
		  		const idField = form.querySelector('input[name="id"]');
		  		const idValue = idField ? idField.value.trim() : "";
		  		console.log("ID trouvé :", idValue);
		      // ✅ Création si id vide ou null
		          const isEdit = idValue !== null && idValue !== "" && idValue !== "0";
		          console.log("isEdit =", isEdit);

		          Swal.fire({
		              title: isEdit ? 'Confirmation' : 'Confirmation',
		              text: isEdit ? 'Voulez-vous modifier ?' : 'Voulez-vous enregistrer ?',
		              icon: 'question',
		              showCancelButton: true,
		              confirmButtonText: 'Oui',
		              cancelButtonText: 'Non',
		              reverseButtons: true
		          }).then((result) => {
		              if (result.isConfirmed) {
		                  form.submit(); // Si confirmé → on envoie le formulaire
		              }
		          });

		  		// ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
		  		    const successDiv = document.getElementById('successMessage');
		  		    if (successDiv && successDiv.textContent.trim() !== '') {
		  		        const msg = successDiv.textContent.trim();
		  		        Swal.fire({
		  		            icon: 'success',
		  		            title: 'Succès !',
		  		            text: msg,
		  		            confirmButtonText: 'OK'
		  		        });
		  		    }
		  		});
		  </script>
		  
		  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

		  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/css/select2.min.css" rel="stylesheet"/>

		  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0/dist/js/select2.min.js"></script>
		  
		  <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
		  
		  <script th:inline="javascript">
		  $(document).ready(function () {

		      const agentSelect = document.getElementById("agentSelect");
		     // const bailSelect = document.getElementById("bail");
		      const encDateInput = document.getElementById("encDate");

		      const montantInput = document.getElementById("montantInput");
		      const montantDisplay = document.getElementById("montantDisplay");

		      const hiddenAgent = document.getElementById("hiddenAgent");
		      const hiddenBail = document.getElementById("hiddenBail");

		      const connectedUserId = hiddenAgent ? hiddenAgent.dataset.userId : null;

			  const bailSelect = $('#bail');
			  const identificationSelect = $('#identification');
		      // =========================
		      // SELECT2 RECHERCHE BAIL
		      // =========================
			  bailSelect.select2({
			          theme: 'bootstrap-5',
			          placeholder: "🔎 Rechercher locataire, téléphone ou bail...",
			          allowClear: true,
			          width: '100%',
			          minimumInputLength: 1,
			          ajax: {
			              url: /*[[@{/bails/api/bails}]]*/,
			              dataType: 'json',
			              delay: 300,
			              data: function(params) {
			                  return { keyword: params.term }; // mot-clé tapé
			              },
			              processResults: function(data) {
			                  return {
			                      results: data.map(b => ({
			                          id: b.id,
			                          text: `${b.locprenom} | Bail: ${b.numero} | Loyer: ${b.montantloyer.toLocaleString('fr-FR')} FCFA`,
			                          loyer: b.montantloyer,
			                          lastpayment: b.derniereDatePaiement,
			                          datedebut: b.dateDebut
			                      }))
			                  };
			              }
			          }
			      });

		      // =========================
		      // SELECT2 QUITTANCE
		      // =========================
			  identificationSelect.select2({
			          theme: 'bootstrap-5',
			          placeholder: "🔎 Rechercher un numéro de quittance...",
			          allowClear: true,
			          width: '100%',
			          minimumInputLength: 1,
			          ajax: {
			              url: /*[[@{/identifications/api/identifications}]]*/,
			              dataType: 'json',
			              delay: 300,
			              data: function(params) {
			                  return { keyword: params.term };
			              },
			              processResults: function(data) {
			                  return {
			                      results: data.map(i => ({
			                          id: i.id,
			                          text: i.numero
			                      }))
			                  };
			              }
			          }
			      });

		      // =========================
		      // UTILITAIRES
		      // =========================
		      function parseNumber(value) {

		          if (!value) return 0;

		          return parseFloat(
		              value.toString()
		                  .replace(/\s/g, "")
		                  .replace(",", ".")
		          ) || 0;

		      }

		      function formatNumber(value) {

		          return (value || 0).toLocaleString("fr-FR");

		      }

		      // =========================
		      // CALCUL ARRIERES
		      // =========================
		      function calculateArrieres(loyer, firstUnpaidDate, encDate) {

		          loyer = parseFloat(loyer) || 0;

		          if (!firstUnpaidDate || !encDate || loyer === 0) {
		              return { arrieres:0, penalite:0, total:0, debut:'', fin:'' };
		          }

		          const debut = new Date(firstUnpaidDate + "T00:00:00");
		          const paiement = new Date(encDate + "T00:00:00");

		          if (paiement < debut) {
		              return { arrieres:0, penalite:0, total:0, debut:'', fin:'' };
		          }

		          let nbMois =
		              (paiement.getFullYear() - debut.getFullYear()) * 12 +
		              paiement.getMonth() - debut.getMonth() + 1;

		          const arrieres = nbMois * loyer;
		          const penalite = paiement.getDate() > 10 ? arrieres * 0.1 : 0;
		          const total = arrieres + penalite;

		          return {

		              arrieres,
		              penalite,
		              total,

		              debut: debut.toLocaleDateString("fr-FR",{month:"2-digit",year:"numeric"}),
		              fin: paiement.toLocaleDateString("fr-FR",{month:"2-digit",year:"numeric"})

		          };

		      }

		      // =========================
		      // CALCUL DETAILS BAIL
		      // =========================
		      function updateBailDetails() {

		          if(!bailSelect || !encDateInput) return;

		          const selected = bailSelect.options[bailSelect.selectedIndex];

		          if (!selected || !selected.dataset || !encDateInput.value) return;

		          const ds = selected.dataset;

		          const encloyer = parseFloat(ds.loyer || 0);

		          const lastPayment =
		              ds.lastpayment ?
		              ds.lastpayment.split("T")[0] :
		              (ds.datedebut ? ds.datedebut.split("T")[0] : null);

		          if(!lastPayment) return;

		          const result = calculateArrieres(encloyer, lastPayment, encDateInput.value);

		          $("#conloyer").val(formatNumber(encloyer) + " FCFA");
		          $("#conloyerInput").val(encloyer);

		          $("#arriereDisplay").val(formatNumber(result.arrieres) + " FCFA");
		          $("#arriereInput").val(result.arrieres);

		          $("#penaliteDisplay").val(formatNumber(result.penalite) + " FCFA");
		          $("#penaliteInput").val(result.penalite);

		          $("#totalDisplay").val(formatNumber(result.total) + " FCFA");
		          $("#totalInput").val(result.total);

		          $("#arriereDebut").val(result.debut);
		          $("#arriereFin").val(result.fin);

		          if(montantDisplay){
		              montantDisplay.value = formatNumber(result.total);
		          }

		          if(montantInput){
		              montantInput.value = result.total;
		          }

		      }

		      // =========================
		      // FORMAT MONTANT
		      // =========================
		      if(montantDisplay){

		          montantDisplay.addEventListener("input", function () {

		              const encMontant = parseNumber(montantDisplay.value);

		              montantDisplay.value = encMontant ? formatNumber(encMontant) : "";
		              if(montantInput){
		                  montantInput.value = encMontant;
		              }

		          });

		      }

		      // =========================
		      // CHANGEMENT AGENT
		      // =========================
		      if (agentSelect) {

		          agentSelect.addEventListener("change", function () {

		              let agentId = this.value;
		              let agentIdIdentification = agentId || connectedUserId;

		              if(hiddenAgent){
		                  hiddenAgent.value = agentIdIdentification;
		              }

		              $('#bail').val(null).trigger('change');

		              if(typeof chargerIdentifications === "function"){
		                  chargerIdentifications(agentIdIdentification);
		              }

		          });

		      }

		      // =========================
		      // CHANGEMENT DATE
		      // =========================
		      if(encDateInput){
		          encDateInput.addEventListener("change", updateBailDetails);
		      }

		  });
		  </script>
		  		  
	  </section>
	</body>
</html>
