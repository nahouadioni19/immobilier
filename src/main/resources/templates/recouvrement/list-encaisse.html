<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
	<!-- Fragment spécifique à cette page -->
	 <section layout:fragment="content">
			<div class="container my-2">
				<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
				    <!-- Titre -->
				    <h2 class="mb-2 mb-md-0">Gestion des recouvrements</h2>
				    <!-- Bouton Nouveau 
				    <a th:href="@{/recouvrements/create}" class="btn btn-primary ms-2">Nouveau</a> -->

				</div>
				
				<hr style="border: 1px solid rgb(192, 192, 192);">
										
				<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
					    
					<form id="filterForm"
					      method="get"
					      th:action="@{/recouvrements/encaissements}"
					      class="mb-3">

					    <input type="hidden" name="page" value="0">

					    <!-- Période -->
					    <div class="card border-primary shadow-sm mb-3">

					        <div class="card-header bg-primary text-white">
					            <i class="bi bi-calendar-range-fill me-2"></i>
					            Période de calcul
					        </div>

					        <div class="card-body">

					            <div class="row align-items-end">

					                <!-- Choix période -->
					                <div class="col-md-2">

					                    <label class="form-label fw-semibold">
					                        Type de période
					                    </label>

					                    <div class="d-flex gap-4">

					                        <div class="form-check">

					                            <input class="form-check-input"
					                                   type="radio"
					                                   id="periodeMois"
					                                   name="periodeType"
					                                   value="MOIS"
					                                   th:checked="${periodeType == null || periodeType == 'MOIS'}">

					                            <label class="form-check-label"
					                                   for="periodeMois">
					                                Mois
					                            </label>

					                        </div>

					                        <div class="form-check">

					                            <input class="form-check-input"
					                                   type="radio"
					                                   id="periodeSemaine"
					                                   name="periodeType"
					                                   value="SEMAINE"
					                                   th:checked="${periodeType == 'SEMAINE'}">

					                            <label class="form-check-label"
					                                   for="periodeSemaine">
					                                Semaine
					                            </label>

					                        </div>

					                    </div>

					                </div>

					                <!-- Valeur -->
					                <div class="col-md-4">

					                    <div id="moisBlock" style="display:none;">

					                        <label class="form-label fw-semibold">
					                            Mois
					                        </label>

					                        <input type="month"
					                               class="form-control"
					                               name="mois"
					                               th:value="${mois}">

					                    </div>

					                    <div id="semaineBlock" style="display:none;">

					                        <label class="form-label fw-semibold">
					                            Semaine
					                        </label>

					                        <select name="dateSemaine"
					                                class="form-select">

					                            <option value="">
					                                Sélectionner une semaine
					                            </option>

					                            <option th:each="s : ${semaines}"
					                                    th:value="${s.dateDebut}"
					                                    th:text="${s.libelle}"
					                                    th:selected="${dateSemaine != null and s.dateDebut.equals(dateSemaine)}">
					                            </option>

					                        </select>

					                    </div>

					                </div>

					                <!-- Recherche -->
					                <div class="col-md-4">

					                    <label class="form-label fw-semibold">
					                        Locataire
					                    </label>

					                    <input type="text"
					                           name="keyword"
					                           class="form-control"
					                           placeholder="Nom ou prénom"
					                           th:value="${keyword}">

					                </div>
									
									
									<div class="col-md-2">

								        <!--<button type="submit"
								                class="btn btn-primary">
								            <i class="bi bi-search me-1"></i>
								            Rechercher
								        </button>-->

								        <a th:href="@{/recouvrements/encaissements}"
								           class="btn btn-secondary">
								            <i class="bi bi-arrow-clockwise me-1"></i>
								            Réinitialiser
								        </a>

								    </div>

					            </div>

					        </div>

					    </div>

					    

					</form>
					
					<br/>
				    <table class="table">
				        <thead class="table-success">
				        <tr>
				            <th>locataire</th>
				            <th>Date</th>
				            <th style="text-align: center;">Montant recouvré</th>
							<th>Agent</th>
				        </tr>
				        </thead>
				        <tbody>				        
						<tr th:each="encaisse : ${encaissesPage.content}">
				            <td th:text="${encaisse.locataireNom +' '+ encaisse.locatairePrenom}">jule</td>
							<td th:text="${#temporals.format(encaisse.encDate, 'dd/MM/yyyy')}"></td>
							<td class="format-fr" th:text="${encaisse.encMontant}" style="text-align: center;">0</td>
							<td th:text="${encaisse.utilisateurNom +' '+ encaisse.utilisateurPrenoms}">herve</td>							
				        </tr>
						<tr th:if="${#lists.isEmpty(encaissesPage.content)}">
					        <td colspan="4" class="text-center">Aucun recouvrement trouvé.</td>
					    </tr>
				    </tbody>
				 </table>
				 
				 
				 <!-- Pagination -->
				 <div class="d-flex justify-content-center mt-3" th:if="${encaissesPage.totalElements > 0}">
				     <ul class="pagination">

				         <!-- Précédent -->
				         <li class="page-item"
				             th:classappend="${encaissesPage.first} ? 'disabled'">
				             <a class="page-link"
				                th:href="@{/recouvrements/encaissements(
				                     page=${encaissesPage.number - 1},
				                     agentId=${selectedAgent},
				                     keyword=${keyword},
				                     periodeType=${periodeType},
				                     dateSemaine=${dateSemaine},
				                     mois=${mois}
				                )}">
				                 &laquo;
				             </a>
				         </li>

				         <!-- Première page -->
				         <li class="page-item"
				             th:if="${encaissesPage.number > 2}">
				             <a class="page-link"
				                th:href="@{/recouvrements/encaissements(
				                     page=0,
				                     agentId=${selectedAgent},
				                     keyword=${keyword},
				                     periodeType=${periodeType},
				                     dateSemaine=${dateSemaine},
				                     mois=${mois}
				                )}">
				                 1
				             </a>
				         </li>

				         <!-- ... -->
				         <li class="page-item disabled"
				             th:if="${encaissesPage.number > 3}">
				             <span class="page-link">...</span>
				         </li>

				         <!-- Pages autour -->
				         <li class="page-item"
				             th:each="i : ${#numbers.sequence(
				                 T(java.lang.Math).max(0, encaissesPage.number - 2),
				                 T(java.lang.Math).min(encaissesPage.totalPages - 1, encaissesPage.number + 2)
				             )}"
				             th:classappend="${i == encaissesPage.number} ? 'active'">

				             <a class="page-link"
				                th:text="${i + 1}"
				                th:href="@{/recouvrements/encaissements(
				                     page=${i},
				                     agentId=${selectedAgent},
				                     keyword=${keyword},
				                     periodeType=${periodeType},
				                     dateSemaine=${dateSemaine},
				                     mois=${mois}
				                )}">
				             </a>

				         </li>

				         <!-- ... -->
				         <li class="page-item disabled"
				             th:if="${encaissesPage.number < encaissesPage.totalPages - 4}">
				             <span class="page-link">...</span>
				         </li>

				         <!-- Dernière page -->
				         <li class="page-item"
				             th:if="${encaissesPage.number < encaissesPage.totalPages - 3}">
				             <a class="page-link"
				                th:text="${encaissesPage.totalPages}"
				                th:href="@{/recouvrements/encaissements(
				                     page=${encaissesPage.totalPages - 1},
				                     agentId=${selectedAgent},
				                     keyword=${keyword},
				                     periodeType=${periodeType},
				                     dateSemaine=${dateSemaine},
				                     mois=${mois}
				                )}">
				             </a>
				         </li>

				         <!-- Suivant -->
				         <li class="page-item"
				             th:classappend="${encaissesPage.last} ? 'disabled'">
				             <a class="page-link"
				                th:href="@{/recouvrements/encaissements(
				                     page=${encaissesPage.number + 1},
				                     agentId=${selectedAgent},
				                     keyword=${keyword},
				                     periodeType=${periodeType},
				                     dateSemaine=${dateSemaine},
				                     mois=${mois}
				                )}">
				                 &raquo;
				             </a>
				         </li>

				     </ul>
				 </div>

				
				</fieldset> 
			</div>
			
			<script>
				document.querySelectorAll('.format-fr').forEach(td => {
			    const value = parseFloat(td.textContent.replace(/\s/g,'')); // supprime espaces éventuels
			    if (!isNaN(value)) {
			        td.textContent = value.toLocaleString('fr-FR');
			    }
			});
			</script>
			
			<!-- SweetAlert2 -->
		    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
			
			<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
					
			<script>
				document.addEventListener("DOMContentLoaded", function () {

				    const form = document.getElementById("filterForm");

				    const radios = document.querySelectorAll("input[name='periodeType']");

				    const semaineBlock = document.getElementById("semaineBlock");
				    const moisBlock = document.getElementById("moisBlock");

				    const dateSemaine = document.querySelector("select[name='dateSemaine']");
				    const mois = document.querySelector("input[name='mois']");
				    const keyword = document.querySelector("input[name='keyword']");
				    const agent = document.querySelector("select[name='agentId']");

				    function getPeriode() {

				        const radio = document.querySelector("input[name='periodeType']:checked");

				        return radio ? radio.value : null;
				    }

				    function toggle() {

				        const periode = getPeriode();

				        if (periode === "SEMAINE") {

				            semaineBlock.style.display = "block";
				            moisBlock.style.display = "none";

				        } else {

				            semaineBlock.style.display = "none";
				            moisBlock.style.display = "block";
				        }
				    }

				    function autoSelectWeek() {

				        if (getPeriode() !== "SEMAINE") {
				            return;
				        }

				        if (dateSemaine && !dateSemaine.value) {

				            const today = new Date();

				            const start = new Date(today);

				            start.setDate(today.getDate() - today.getDay() + 1);

				            const yyyy = start.getFullYear();
				            const mm = String(start.getMonth() + 1).padStart(2, "0");
				            const dd = String(start.getDate()).padStart(2, "0");

				            const value = `${yyyy}-${mm}-${dd}`;

				            for (const opt of dateSemaine.options) {

				                if (opt.value === value) {

				                    dateSemaine.value = value;
				                    break;
				                }
				            }
				        }
				    }

				    // Initialisation
				    toggle();
				    autoSelectWeek();

				    // Changement de période
				    radios.forEach(radio => {

				        radio.addEventListener("change", function () {

				            toggle();
				            autoSelectWeek();

				            if (getPeriode() !== "SEMAINE" && dateSemaine) {
				                dateSemaine.value = "";
				            }

				            if (getPeriode() !== "MOIS" && mois) {
				                mois.value = "";
				            }

				            form.submit();
				        });

				    });

				    if (dateSemaine) {
				        dateSemaine.addEventListener("change", () => form.submit());
				    }

				    if (mois) {
				        mois.addEventListener("change", () => form.submit());
				    }

				    if (agent) {
				        agent.addEventListener("change", () => form.submit());
				    }

				    if (keyword) {

				        let timer;

				        keyword.addEventListener("input", function () {

				            clearTimeout(timer);

				            timer = setTimeout(() => form.submit(), 500);

				        });
				    }

				});
			</script>
			

	   
	 </section>

</body>
</html>
