<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .select2-container { width: 100% !important; }
        .select2-container .select2-selection--single { height: 38px !important; padding: 0.375rem 0.75rem !important; border: 1px solid #ced4da; border-radius: 0.375rem; }
        .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 24px !important; padding-left: 0 !important; }
        .select2-container--default .select2-selection--single .select2-selection__arrow { height: 36px !important; top: 1px !important; }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="container my-2">
        <h2>Gestion des bails</h2>
        <hr>
        <form th:action="@{/bails/save}" th:object="${bail}" method="post" enctype="multipart/form-data" 
              class="border p-4 rounded shadow-sm bg-white" id="bailForm">
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{version}"/>

            <!-- Informations Locataire -->
            <div class="row">
                <div class="col-md-4">
                    <label for="locataireSelect">Locataire <span style="color:red;">*</span></label>
                    <select id="locataireSelect" name="locataire.id" class="form-select" required></select>
                </div>
                <div class="col-md-4">
                    <label>Téléphone :</label>
                    <input type="text" id="telInput" class="form-control" readonly>
                </div>
                <div class="col-md-4">
                    <label>E.mail :</label>
                    <input type="text" id="emailInput" class="form-control" readonly>
                </div>
            </div>
            <hr>

            <!-- Informations Appartement -->
            <div class="row">
                <div class="col-md-4">
                    <label for="appartementSelect">Appartement <span style="color:red;">*</span></label>
                    <select id="appartementSelect" name="appartement.id" class="form-select" required></select>
                </div>
                <div class="col-md-4">
                    <label>Libellé :</label>
                    <input type="text" id="libelleInput" class="form-control" readonly>
                </div>
                <div class="col-md-4">
                    <label>Loyer mensuel :</label>
                    <input type="text" id="loyerInput" class="form-control" readonly>
                </div>
            </div>
            <hr>

            <!-- Total, Dates et Usage -->
            <div class="row">
                <div class="col-md-4">
                    <label>Total caution</label>
                    <input type="text" id="cautionDisplay" class="form-control" placeholder="0">
                    <input type="hidden" th:field="*{caution}" id="cautionInput">
                </div>
                <div class="col-md-4">
                    <label>Total avance</label>
                    <input type="text" id="avanceDisplay" class="form-control" placeholder="0">
                    <input type="hidden" th:field="*{avance}" id="avanceInput">
                </div>
                <div class="col-md-4">
                    <label>Total honoraire</label>
                    <input type="text" id="honoraireDisplay" class="form-control" placeholder="0">
                    <input type="hidden" th:field="*{honoraire}" id="honoraireInput">
                </div>
                <div class="col-md-4">
                    <label>Total à payer</label>
                    <input type="text" id="totalDisplay" class="form-control" readonly>
                    <input type="hidden" th:field="*{total}" id="totalInput">
                </div>
                <div class="col-md-4">
                    <label>Date début bail <span style="color:red;">*</span></label>
                    <input type="date" th:field="*{dateDebut}" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label>Date début paiement <span style="color:red;">*</span></label>
                    <input type="date" th:field="*{dateFin}" class="form-control" required>
                </div>
            </div>
            <hr>

            <!-- Boutons -->
            <div class="row g-2">
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <span th:text="*{id} == null ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
                    </button>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/bails}" class="btn btn-danger w-100">Retour à la liste</a>
                </div>
            </div>
        </form>
    </div>

    <!-- ========================= JS ========================== -->
    <script th:inline="javascript">
    $(document).ready(function() {

        // --- Select2 Locataire ---
        $('#locataireSelect').select2({
            theme: 'bootstrap-5',
            placeholder: 'Rechercher un locataire',
            minimumInputLength: 1,
            language: {
                inputTooShort: () => 'Veuillez saisir 1 caractère ou plus',
                noResults: () => 'Aucun résultat trouvé',
                searching: () => 'Recherche en cours…'
            },
            ajax: {
                url: /*[[@{/locataires/api/locataires}]]*/,
                dataType: 'json',
                delay: 250,
                data: params => ({ term: params.term }),
                processResults: data => data
            }
        });

        // Préremplissage Locataire
        const currentLocataire = /*[[${currentLocataireData}]]*/ null;
        if(currentLocataire){
            $('#locataireSelect').append(
                new Option(
                    currentLocataire.prenom + ' ' + currentLocataire.nom + ' - ' + currentLocataire.telephone,
                    currentLocataire.id,
                    true,
                    true
                )
            ).trigger('change');

            $('#telInput').val(currentLocataire.telephone);
            $('#emailInput').val(currentLocataire.email);
        }

        $('#locataireSelect').on('select2:select', function(e){
            const data = e.params.data;
            $('#telInput').val(data.telephone || '');
            $('#emailInput').val(data.email || '');
        });
        $('#locataireSelect').on('select2:clear', function(){
            $('#telInput').val('');
            $('#emailInput').val('');
        });

        // --- Select2 Appartement ---
        $('#appartementSelect').select2({
            theme: 'bootstrap-5',
            placeholder: 'Rechercher un appartement',
            minimumInputLength: 1,
            language: {
                inputTooShort: () => 'Veuillez saisir 1 caractère ou plus',
                noResults: () => 'Aucun résultat trouvé',
                searching: () => 'Recherche en cours…'
            },
            ajax: {
                url: /*[[@{/patrimoines/api/appartements}]]*/,
                dataType: 'json',
                delay: 250,
                data: params => ({ term: params.term }),
                processResults: data => data
            }
        });

        // Préremplissage Appartement
        const currentAppartement = /*[[${currentAppartementData}]]*/ null;
        if(currentAppartement){
            $('#appartementSelect').append(
                new Option(
                    currentAppartement.libelle + ' - ' + currentAppartement.loyerMensuel + ' F',
                    currentAppartement.id,
                    true,
                    true
                )
            ).trigger('change');

            $('#libelleInput').val(currentAppartement.libelle);
            $('#loyerInput').val(currentAppartement.loyerMensuel);
        }

        $('#appartementSelect').on('select2:select', function(e){
            const data = e.params.data;
            $('#libelleInput').val(data.libelle || '');
            $('#loyerInput').val(data.loyerMensuel || '');
        });
        $('#appartementSelect').on('select2:clear', function(){
            $('#libelleInput').val('');
            $('#loyerInput').val(0);
        });

        // --- Total, caution, avance, honoraire ---
        function updateTotals() {
            const parse = v => parseFloat(v.toString().replace(/\s/g, "").replace(",", ".")) || 0;
            const format = v => v ? v.toLocaleString("fr-FR") : "";

            const c = parse($('#cautionDisplay').val()), a = parse($('#avanceDisplay').val()), h = parse($('#honoraireDisplay').val());
            $('#totalDisplay').val(format(c + a + h));
            $('#cautionInput').val(c); $('#avanceInput').val(a); $('#honoraireInput').val(h); $('#totalInput').val(c + a + h);
        }

        ['#cautionDisplay','#avanceDisplay','#honoraireDisplay'].forEach(id => {
            $(id).on('input', updateTotals);
        });
        updateTotals();

        // --- Confirmation SweetAlert ---
        $('#bailForm').on('submit', function(e){
            e.preventDefault();
            const form = this;
            const isEdit = $(form).find('input[name="id"]').val().trim() !== "";
            Swal.fire({
                title: isEdit ? 'Confirmation' : 'Confirmation',
                text: isEdit ? 'Voulez-vous modifier ?' : 'Voulez-vous enregistrer ?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Oui',
                cancelButtonText: 'Non',
                reverseButtons: true
            }).then(result => {
                if(result.isConfirmed){
                    form.submit();
                }
            });
        });

    });
    </script>
</section>
</body>
</html>
