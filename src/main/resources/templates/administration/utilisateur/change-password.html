<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
    <!-- Contenu spécifique à cette page -->
    <section layout:fragment="content">
        <!-- Ton contenu principal ici -->
		<div class="container my-2">
			<div class="container mt-4">
				
				<h2 class="mb-4">Changer le mot de passe</h2>
				
				<form th:action="@{/utilisateurs/change-password}" th:object="${passwordForm}" method="post" id="changeForm">
					
			        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					
					<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
						<div class="col-sm-12 col-md-6">
							<div class="mb-3 form-group">
					            <label for="currentPassword" class="form-label">Mot de passe actuel<span class="text-danger">*</span></label>
					            <input type="password" th:field="*{currentPassword}" class="form-control" id="currentPassword" placeholder="Mot de passe actuel" required>
					            <div class="text-danger" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
					        </div>
						</div>
						
						<div class="col-sm-12 col-md-6">
							<div class="mb-3 form-group">
					            <label for="newPassword" class="form-label">Nouveau mot de passe<span class="text-danger">*</span></label>
					            <input type="password" th:field="*{newPassword}" class="form-control" id="newPassword" placeholder="Nouveau mot de passe" required>
					            <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
					        </div>
						</div>
						
						<div class="col-sm-12 col-md-6">
							<div class="mb-3 form-group">
					            <label for="confirmPassword" class="form-label">Confirmer le nouveau mot de passe<span class="text-danger">*</span></label>
					            <input type="password" th:field="*{confirmPassword}" class="form-control" id="confirmPassword" placeholder="Confirmation du nouveau mot de passe" required>
					            <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
							</div>
						</div>
						
						<hr>
						
						<div class="mt-3 row g-2">
						    <div class="col-12 col-md-2">
						        <button type="submit" class="btn btn-primary w-100">
						            <span>Valider</span>
						        </button>
						    </div>
						    <div class="col-12 col-md-2">
						        <a th:href="@{/}" class="btn btn-danger w-100">Annuler</a>
						    </div>
						</div>
						
					</fieldset>
			    </form>
			</div>
		 </div>
		 
		 <!-- ✅ SweetAlert2 -->
 	    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		
		<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
 	    <!-- ⚠️ Boîte de confirmation avant envoi -->
 	    
		<!-- ⚠️ Confirmation avant envoi -->
		<script>
		document.getElementById('changeForm').addEventListener('submit', function (e) {
		    e.preventDefault(); // Bloque l’envoi automatique
		    const form = this;

		    Swal.fire({
		        title: 'Confirmation',
		        text: 'Voulez-vous valider ?',
		        icon: 'question',
		        showCancelButton: true,
		        confirmButtonText: 'Oui',
		        cancelButtonText: 'Non',
		        reverseButtons: true
		    }).then((result) => {
		        if (result.isConfirmed) {
		            form.submit(); // Si confirmé → on envoie le formulaire
		        }
		    });
		});
		</script>

		<!-- ✅ Script séparé pour afficher le message de succès -->
		<!-- ✅ Message de succès (flash attribute) -->
		<div th:if="${successMessage}" 
		     th:text="${successMessage}" 
		     id="successMessage" 
		     style="display:none;">
		</div>

		<!-- ⚠️ Message d’erreur (flash attribute) -->
		<div th:if="${errorMessage}" 
		     th:text="${errorMessage}" 
		     id="errorMessage" 
		     style="display:none;">
		</div>

		<!-- 💬 SweetAlert après redirection -->
		<script>
		document.addEventListener('DOMContentLoaded', function () {
		    const successDiv = document.getElementById('successMessage');
		    const errorDiv = document.getElementById('errorMessage');

		    if (successDiv && successDiv.textContent.trim() !== '') {
		        Swal.fire({
		            icon: 'success',
		            title: 'Succès !',
		            text: successDiv.textContent.trim(),
		            confirmButtonText: 'OK'
		        });
		    } 
		    else if (errorDiv && errorDiv.textContent.trim() !== '') {
		        Swal.fire({
		            icon: 'error',
		            title: 'Erreur !',
		            text: errorDiv.textContent.trim(),
		            confirmButtonText: 'OK'
		        });
		    }
		});
		</script>

		 
    </section>
	
</body>
</html>
