<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
<section layout:fragment="content">
    <div class="container my-2">
        <div class="container mt-4">
            <h2>Gestion des utilisateurs</h2>
			
        <form th:action="@{/utilisateurs/save}" th:object="${utilisateur}" method="post" 
              enctype="multipart/form-data" class="border p-4 rounded shadow-sm bg-white" id="userForm">

            <input type="hidden" th:field="*{id}"/>
			<input type="hidden" th:field="*{version}" />
			
			<h5 class="mb-0"> Connexion</h5>
			
            <div class="row">
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label for="username" class="form-label">Identifiant</label>
                        <input type="text" th:field="*{username}" class="form-control" required>
                    </div>
                </div>
            </div>
            <hr>

            <div class="row">
				
				<h5 class="mb-0"> Informations utilisateur</h5>
					
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label for="matricule" class="form-label">Matricule</label>
                        <input type="text" th:field="*{matricule}" class="form-control" 
                               required th:disabled="${isUpdate}" oninput="uppercaseWords(this)">
                    </div>
                </div>

                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label for="titre" class="form-label">Civilité</label>
                        <select th:field="*{titre}" class="form-control" required>
                            <option value=""></option>
                            <option th:each="item : ${listTitre}" th:value="${item}" th:text="${item}"></option>
                        </select>
                    </div>
                </div>                             
            </div>

            <div class="row">
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label class="form-label">Nom</label>
                        <input type="text" th:field="*{nom}" class="form-control" required oninput="uppercaseWords(this)">
                    </div>
                </div>
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label class="form-label">Prénom(s)</label>
                        <input type="text" th:field="*{prenoms}" class="form-control" required oninput="capitalizeWords(this)">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label class="col-form-label">Téléphone</label>
                        <input type="text" th:field="*{telephone}" class="form-control phone_ci" placeholder="00 00 00 00 00" maxlength="14" inputmode="numeric" required>
                    </div>
                </div>
                <div class="col-sm-12 col-md-6">
                    <div class="mb-3 form-group">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>
                </div>
            </div>

            <hr>
            
			
			<div class="card shadow-sm mb-4 border-0">
			    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
			        <h5 class="mb-0"><i class="bi bi-people-fill me-2"></i> Assignations (Rôles)</h5>
			        <button type="button" class="btn btn-light btn-sm" onclick="addAssignation()">
			            <i class="bi bi-plus-circle"></i> Ajouter un rôle
			        </button>
			    </div>

			    <div class="card-body" id="assignations-container">
			        <div th:each="assignation, stat : *{assignations}" 
			             class="assignation-row border rounded p-3 mb-3 bg-light">
			            
			            <div class="row g-3 align-items-end">
			                <div class="col-md-4">
			                    <label class="form-label fw-semibold">Rôle</label>
			                    <select th:field="*{assignations[__${stat.index}__].roleId}" 
			                            class="form-select shadow-sm" required>
			                        <option value="" disabled selected>-- Sélectionner --</option>
			                        <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.libelle}"></option>
			                    </select>
			                </div>

			                <div class="col-md-3">
			                    <label class="form-label fw-semibold">Date de début</label>
			                    <input type="date" th:field="*{assignations[__${stat.index}__].dateDebut}" 
			                           class="form-control shadow-sm">
			                </div>

			                <div class="col-md-3">
			                    <label class="form-label fw-semibold">Date de fin</label>
			                    <input type="date" th:field="*{assignations[__${stat.index}__].dateFin}" 
			                           class="form-control shadow-sm">
			                </div>

			                <div class="col-md-2 text-end">
			                    <button type="button" class="btn btn-outline-danger w-100" onclick="removeAssignation(this)">
			                        <i class="bi bi-trash"></i> Supprimer
			                    </button>
			                </div>
			            </div>
			        </div>
			    </div>
			</div>

            <hr>

            <div class="mt-3 row g-2">
                <div class="col-12 col-md-2">
                    <button type="submit" class="btn btn-primary w-100">
                        <span th:text="*{id} == null ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
                    </button>
                </div>
                <div class="col-12 col-md-2">
                    <a th:href="@{/utilisateurs}" class="btn btn-danger w-100">Retour à la liste</a>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- ==== JS pour gestion assignations dynamiques ==== -->
<script th:inline="javascript">
/*<![CDATA[*/
    var roles = /*[[${roles}]]*/ [];
    var assignationIndex = /*[[${#lists.size(utilisateur.assignations)}]]*/ 0;
/*]]>*/
</script>


<script>
function addAssignation() {
    const container = document.getElementById("assignations-container");
    const newRow = document.createElement("div");
    newRow.classList.add("row", "assignation-row");

    let optionsHtml = '<option value="">-- Choisir un rôle --</option>';
    roles.forEach(r => {
        optionsHtml += `<option value="${r.id}">${r.libelle}</option>`;
    });

    newRow.innerHTML = `
	<div class="card shadow-sm mb-4 border-0">
		<div class="row g-3 align-items-end">
			<div class="col-md-4">
				<label class="form-label fw-semibold">Rôle</label>
	            <select name="assignations[${assignationIndex}].roleId"  class="form-select shadow-sm" required>
	                ${optionsHtml}
	            </select>
	        </div>
			<div class="col-md-3">
				<label class="form-label fw-semibold">Date de début</label>
	            <input type="date" name="assignations[${assignationIndex}].dateDebut" class="form-control shadow-sm">
	        </div>
			<div class="col-md-3">
				<label class="form-label fw-semibold">Date de fin</label>
	            <input type="date" name="assignations[${assignationIndex}].dateFin" class="form-control shadow-sm">
	        </div>
	        		
			<div class="col-md-2 text-end">
				<button type="button" class="btn btn-outline-danger w-100" onclick="removeAssignation(this)">
					<i class="bi bi-trash"></i> Supprimer
				</button>
			</div>	
		</div>	
	</div>
    `;
	
    container.appendChild(newRow);
    assignationIndex++;
}

function removeAssignation(btn) {
    btn.closest('.assignation-row').remove();
}
</script>

<!-- ==== Scripts utilitaires ==== -->
<script>
    function capitalizeWords(input) {
        input.value = input.value.replace(/\b[\p{L}']+/gu, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    }
    function uppercaseWords(input){
        input.value = input.value.replace(/\b[\p{L}']+/gu, w => w.charAt(0).toUpperCase() + w.slice(1).toUpperCase());
    }
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll('.phone_ci').forEach(input => {
            input.addEventListener('input', (e) => {
                let v = e.target.value.replace(/\D/g, '').substring(0,10);
                e.target.value = v.match(/.{1,2}/g)?.join(' ') ?? v;
            });
        });
    });
</script>

</section>
</body>
</html>
