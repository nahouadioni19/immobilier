<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	  
	  <head th:replace="~{fragments/head :: head}"></head>
	  
<body class="d-flex flex-column min-vh-100">
		
	<div th:replace="~{fragments/navbar :: navbar}"></div>
		
	<div class="d-flex">
	        <!-- Sidebar -->
		<div th:replace="~{fragments/sidebar :: sidebar}"></div>		
	        <!-- Contenu principal -->
        <div class="container-fluid p-4">
            <!-- Ton contenu principal ici -->
			<div class="container my-2">
				<div class="container mt-4">
				    <h2 th:text="${utilisateur.id == 0} ? 'Ajouter un utilisateur' : 'Modifier un utilisateur'">Ajouter une banque</h2>
				    <hr>
					
					<form th:action="@{/utilisateurs/save}" th:object="${utilisateur}" method="post" enctype="multipart/form-data">
					    <input type="hidden" th:field="*{id}"/>

					    <fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
					        <h4>Informations Utilisateur</h4>
					        <div class="row">
					            <div class="col-md-6">
					                <label>Identifiant</label>
					                <input type="text" th:field="*{username}" class="form-control" required>
					            </div>
					            <div class="col-md-6">
					                <label>Matricule</label>
					                <input type="text" th:field="*{matricule}" class="form-control" required th:disabled="${isUpdate}" oninput="uppercaseWords(this)">
					            </div>
					        </div>

					        <div class="row mt-2">
					            <div class="col-md-6">
					                <label>Nom</label>
					                <input type="text" th:field="*{nom}" class="form-control" required oninput="uppercaseWords(this)">
					            </div>
					            <div class="col-md-6">
					                <label>Prénom(s)</label>
					                <input type="text" th:field="*{prenoms}" class="form-control" required oninput="capitalizeWords(this)">
					            </div>
					        </div>

					        <div class="row mt-2">
					            <div class="col-md-6">
					                <label>Téléphone</label>
					                <input type="text" th:field="*{telephone}" class="form-control phone_ci" placeholder="00 00 00 00 00" maxlength="14" inputmode="numeric" required>
					            </div>
					            <div class="col-md-6">
					                <label>Email</label>
					                <input type="email" th:field="*{email}" class="form-control" required>
					            </div>
					        </div>

					        <hr>
					        <h4>Assignations (Rôles)</h4>
					        <div id="assignations-container">
					            <div th:each="assignation, stat : *{assignations}" class="assignation-row row">
					                <div class="col-md-3">
					                    <label>Rôle</label>
					                    <select th:field="*{assignations[__${stat.index}__].role}" class="form-control">
					                        <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.libelle}"></option>
					                    </select>
					                </div>
					                <div class="col-md-3">
					                    <label>Début</label>
					                    <input type="date" th:field="*{assignations[__${stat.index}__].dateDebut}" class="form-control">
					                </div>
					                <div class="col-md-3">
					                    <label>Fin</label>
					                    <input type="date" th:field="*{assignations[__${stat.index}__].dateFin}" class="form-control">
					                </div>
					                <div class="col-md-3 d-flex align-items-end">
					                    <button type="button" class="btn btn-danger w-100" onclick="removeAssignation(this)">❌</button>
					                </div>
					            </div>
					        </div>

					        <div class="mt-2">
					            <button type="button" class="btn btn-primary" onclick="addAssignation()">➕ Ajouter un rôle</button>
					        </div>

					        <hr>
					        <div class="mt-3 row g-2">
					            <div class="col-12 col-md-2">
					                <button type="submit" class="btn btn-success w-100">
					                    <span th:text="*{id} == 0 ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
					                </button>
					            </div>
					            <div class="col-12 col-md-2">
					                <a th:href="@{/utilisateurs}" class="btn btn-danger w-100">Retour à la liste</a>
					            </div>
					        </div>
					    </fieldset>
					</form>
				</div>
			 </div>
        </div>
    </div>

	<script>
        // Toggle sidebar on mobile
        document.getElementById('toggleSidebar').addEventListener('click', function () {
            document.getElementById('sidebar').classList.toggle('show');
        });
    </script>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	
	<script>
		//AFFICHE LA PREMIERE LETTRE EN MAJUSCULE
		function capitalizeWords(input) {
		    input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
		        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
		    });
		}
	
		//METTRE TOUT LE MOT EN MAJUSCULE
		function uppercaseWords(input){
			input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
				return word.charAt(0).toUpperCase() + word.slice(1).toUpperCase();
			});
		}
	</script>
	
	<script th:inline="javascript">
	/*<![CDATA[*/
	    let roles = /*[[${roles}]]*/ [];
	    let assignationIndex = /*[[${#lists.size(utilisateur.assignations)}]]*/ 0;

	    function addAssignation() {
	        const container = document.getElementById("assignations-container");
	        const newRow = document.createElement("div");
	        newRow.classList.add("assignation-row", "row", "mt-2");

	        let options = roles.map(r => `<option value="${r.id}">${r.libelle}</option>`).join('');

	        newRow.innerHTML = `
	            <div class="col-md-3">
	                <label>Rôle</label>
	                <select name="assignations[${assignationIndex}].role.id" class="form-control">${options}</select>
	            </div>
	            <div class="col-md-3">
	                <label>Début</label>
	                <input type="date" name="assignations[${assignationIndex}].dateDebut" class="form-control">
	            </div>
	            <div class="col-md-3">
	                <label>Fin</label>
	                <input type="date" name="assignations[${assignationIndex}].dateFin" class="form-control">
	            </div>
	            <div class="col-md-3 d-flex align-items-end">
	                <button type="button" class="btn btn-danger w-100" onclick="removeAssignation(this)">❌</button>
	            </div>
	        `;

	        container.appendChild(newRow);
	        assignationIndex++;
	    }

	    function removeAssignation(btn) {
	        btn.closest('.assignation-row').remove();
	    }
	/*]]>*/
	</script>
	
	<script>
	document.addEventListener("DOMContentLoaded", () => {
	  document.querySelectorAll('.phone_ci').forEach(input => {
	    input.addEventListener('input', (e) => {
	      let v = e.target.value.replace(/\D/g, ''); // garder que les chiffres
	      v = v.substring(0, 10); // max 10 chiffres
	      v = v.match(/.{1,2}/g)?.join(' ') ?? v; // groupes de 2 séparés par espace
	      e.target.value = v;
	    });
	  });
	});
	</script>
	
	<div th:replace="~{fragments/footer :: footer}"></div>
	
</body>
</html>
