<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Changer le mot de passe</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body>
<div class="container mt-5">

    <h2 class="mb-4">Changer le mot de passe</h2>

    <!-- Message de succès ou erreur -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

	<form th:action="@{/change-password}" th:object="${passwordForm}" method="post">

	        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

	        <div class="mb-3">
	            <label for="currentPassword" class="form-label">Mot de passe actuel</label>
	            <input type="password" th:field="*{currentPassword}" class="form-control" id="currentPassword" required>
	            <div class="text-danger" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
	        </div>

	        <div class="mb-3">
	            <label for="newPassword" class="form-label">Nouveau mot de passe</label>
	            <input type="password" th:field="*{newPassword}" class="form-control" id="newPassword" required>
	            <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
	        </div>

	        <div class="mb-3">
	            <label for="confirmPassword" class="form-label">Confirmer le nouveau mot de passe</label>
	            <input type="password" th:field="*{confirmPassword}" class="form-control" id="confirmPassword" required>
	            <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
	        </div>

	        <button type="submit" class="btn btn-primary">Valider</button>
	        <a th:href="@{/}" class="btn btn-secondary ms-2">Annuler</a>
	    </form>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
