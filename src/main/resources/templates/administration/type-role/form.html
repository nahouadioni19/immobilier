<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>
    <!-- Contenu spécifique à cette page -->
    <section layout:fragment="content">
	            <!-- Ton contenu principal ici -->
		<div class="container my-2">
			<div class="container mt-4">
			    <h2>Gestion des type de rôles</h2>			   

			    <form th:action="@{/type-roles/save}" th:object="${typerole}" method="post" 
											class="border p-4 rounded shadow-sm bg-white" id="typeroleForm">
											
			        <input type="hidden" th:field="*{id}"/>
					<input type="hidden" th:field="*{version}"/>
					
					<fieldset style="border: 1px solid #ccc; padding: 10px; border-radius: 10px;">
			        <div class="mb-3">
			            <label for="code" class="form-label">Code</label>
			            <input type="text" th:field="*{code}" class="form-control" placeholder="Ex: 0000" required oninput="uppercaseWords(this)">
			        </div>

			        <div class="mb-3">
			            <label for="libelle" class="form-label">Libellé</label>
			            <input type="text" th:field="*{libelle}" class="form-control" placeholder="Libelle" required oninput="capitalizeWords(this)">
			        </div>						
					
					<div class="mt-3 row g-2">
					    <div class="col-12 col-md-2">
					        <button type="submit" class="btn btn-primary w-100">
					            <span th:text="*{id} == null ? 'Enregistrer' : 'Modifier'">Enregistrer</span>
					        </button>
					    </div>
					    <div class="col-12 col-md-2">
					        <a th:href="@{/type-roles}" class="btn btn-danger w-100">
					            Retour à la liste
					        </a>
					    </div>
					</div>
					</fieldset>
			    </form>
			</div>
		 </div>
	
		
		<script>
			//AFFICHE LA PREMIERE LETTRE EN MAJUSCULE
			function capitalizeWords(input) {
			    input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
			        return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
			    });
			}
		
			//METTRE TOUT LE MOT EN MAJUSCULE
			function uppercaseWords(input){
				input.value = input.value.replace(/\b[\p{L}']+/gu, function(word) {
					return word.charAt(0).toUpperCase() + word.slice(1).toUpperCase();
				});
			}
		</script>
	
		
		<!-- ✅ SweetAlert2 -->
	    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		<div th:if="${successMessage}" th:text="${successMessage}" id="successMessage" style="display:none;"></div>
	    <!-- ⚠️ Boîte de confirmation avant envoi -->
	    <script>
	        document.getElementById('typeroleForm').addEventListener('submit', function (e) {
	            e.preventDefault(); // Bloque l’envoi automatique
	            const form = this;
	            const isEdit = form.querySelector('input[name="id"]').value !== "";

	            Swal.fire({
	                title: isEdit ? 'Confirmation' : 'Confirmation',
	                text: isEdit ? 'Voulez-vous modifier ?' : 'Voulez-vous enregistrer ?',
	                icon: 'question',
	                showCancelButton: true,
	                confirmButtonText: 'Oui',
	                cancelButtonText: 'Non',
	                reverseButtons: true
	            }).then((result) => {
	                if (result.isConfirmed) {
	                    form.submit(); // Si confirmé → on envoie le formulaire
	                }
	            });

				// ==== AFFICHAGE DU MESSAGE SUCCÈS APRÈS ACTION ====
			    const successDiv = document.getElementById('successMessage');
			    if (successDiv && successDiv.textContent.trim() !== '') {
			        const msg = successDiv.textContent.trim();
			        Swal.fire({
			            icon: 'success',
			            title: 'Succès !',
			            text: msg,
			            confirmButtonText: 'OK'
			        });
			    }
			});
	    </script>
    </section>
	
</body>
</html>
