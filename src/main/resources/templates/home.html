    const data = /*[[${loyers}]]*/ [];

        data: {
            labels: labels,
            datasets: [{
                label: 'Loyers encaissés (FCFA)',
                data: data,
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.3,
